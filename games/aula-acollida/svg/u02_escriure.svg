  <rect x="18" y="15" width="50" height="62" rx="3" fill="white" stroke="#d1d5db" stroke-width="2"/>
  <!-- Text lines on paper -->
  <line x1="25" y1="28" x2="60" y2="28" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="25" y1="36" x2="60" y2="36" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="25" y1="44" x2="60" y2="44" stroke="#d1d5db" stroke-width="1.5"/>
  <!-- Written text lines -->
  <line x1="25" y1="28" x2="48" y2="28" stroke="#374151" stroke-width="2"/>
  <line x1="25" y1="36" x2="55" y2="36" stroke="#374151" stroke-width="2"/>
  <!-- Pencil -->
  <rect x="55" y="45" width="8" height="32" rx="2" transform="rotate(-30 59 61)" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <polygon points="55,77 59,69 63,77" transform="rotate(-30 59 73)" fill="#f97316"/>
  <polygon points="56,77 62,77 59,82" transform="rotate(-30 59 79)" fill="#374151"/>
