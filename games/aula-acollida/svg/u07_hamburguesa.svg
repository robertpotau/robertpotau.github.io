<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#fffbeb" rx="12"/>
  <!-- Top bun -->
  <ellipse cx="50" cy="32" rx="32" ry="16" fill="#d97706" stroke="#b45309" stroke-width="2"/>
  <!-- Bun shine -->
  <ellipse cx="42" cy="27" rx="10" ry="5" fill="#f59e0b" opacity="0.5"/>
  <!-- Sesame seeds -->
  <ellipse cx="38" cy="26" rx="3" ry="1.5" fill="#fef3c7" transform="rotate(-20 38 26)"/>
  <ellipse cx="50" cy="24" rx="3" ry="1.5" fill="#fef3c7" transform="rotate(10 50 24)"/>
  <ellipse cx="61" cy="27" rx="3" ry="1.5" fill="#fef3c7" transform="rotate(-30 61 27)"/>
  <!-- Top bun bottom -->
  <rect x="18" y="44" width="64" height="4" rx="2" fill="#d97706"/>
  <!-- Cheese (formatge) -->
  <polygon points="18,48 82,48 85,54 15,54" fill="#fbbf24"/>
  <!-- Lettuce (enciam) -->
  <path d="M15 54 Q20 58 26 54 Q32 58 38 54 Q44 58 50 54 Q56 58 62 54 Q68 58 74 54 Q80 58 85 54" fill="none" stroke="#4ade80" stroke-width="5" stroke-linecap="round"/>
  <!-- Tomato (tomàquet) -->
  <rect x="18" y="58" width="64" height="6" rx="3" fill="#ef4444"/>
  <!-- Meat patty -->
  <rect x="17" y="64" width="66" height="8" rx="4" fill="#92400e" stroke="#78350f" stroke-width="1.5"/>
  <!-- Bottom bun -->
  <ellipse cx="50" cy="76" rx="32" ry="10" fill="#d97706" stroke="#b45309" stroke-width="2"/>
  <ellipse cx="50" cy="73" rx="32" ry="5" fill="#f59e0b" opacity="0.3"/>
  <!-- Label -->
</svg>
