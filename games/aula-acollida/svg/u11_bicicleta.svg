  <line x1="70" y1="44" x2="70" y2="54" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="44" x2="76" y2="44" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
