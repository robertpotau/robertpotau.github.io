<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 45">
  <!-- cos del llapis (groc) -->
  <rect x="22" y="12" width="90" height="22" fill="#fbbf24"/>
  <!-- goma d'esborrar (rosa) -->
  <rect x="110" y="12" width="18" height="22" rx="3" fill="#fca5a5"/>
  <!-- virolla metàl·lica -->
  <rect x="104" y="12" width="8" height="22" fill="#d1d5db"/>
  <!-- con de fusta -->
  <polygon points="22,12 22,34 6,23" fill="#a16207"/>
  <!-- punta de grafit -->
  <polygon points="9,19 9,27 5,23" fill="#374151"/>
  <!-- línia de separació cos/virolla -->
  <line x1="104" y1="12" x2="104" y2="34" stroke="#e5e7eb" stroke-width="1"/>
</svg>
