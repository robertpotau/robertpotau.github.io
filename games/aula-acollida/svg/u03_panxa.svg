<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Torso body -->
  <rect x="28" y="38" width="44" height="40" rx="6" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <!-- Belly highlight -->
  <ellipse cx="50" cy="60" rx="18" ry="14" fill="#ffe082" stroke="#d97706" stroke-width="2"/>
  <!-- Belly button -->
  <circle cx="50" cy="62" r="3" fill="#d97706"/>
  <!-- Neckline -->
  <rect x="42" y="30" width="16" height="12" rx="4" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <!-- Shoulders -->
  <ellipse cx="28" cy="42" rx="8" ry="6" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <ellipse cx="72" cy="42" rx="8" ry="6" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <!-- Arrow pointing to belly -->
  <line x1="82" y1="38" x2="70" y2="56" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="68" cy="58" r="4" fill="#ef4444"/>
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">PANXA</text>
</svg>
