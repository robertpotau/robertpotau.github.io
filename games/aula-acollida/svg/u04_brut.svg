<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- T-shirt body (white/light, dirty) -->
  <path d="M28 30 L22 72 L78 72 L72 30 Z" fill="#f5f5f5"/>
  <!-- Left sleeve -->
  <path d="M28 30 L16 24 L12 42 L24 46 Z" fill="#f5f5f5"/>
  <!-- Right sleeve -->
  <path d="M72 30 L84 24 L88 42 L76 46 Z" fill="#f5f5f5"/>
  <!-- Crew neck -->
  <path d="M38 30 Q50 36 62 30 Q58 28 50 27 Q42 28 38 30 Z" fill="#e5e7eb"/>

  <!-- Mud/dirt stains (brown) -->
  <ellipse cx="42" cy="55" rx="9" ry="7" fill="#92400e" opacity="0.75"/>
  <ellipse cx="48" cy="62" rx="5" ry="4" fill="#92400e" opacity="0.6"/>
  <ellipse cx="34" cy="46" rx="4" ry="3" fill="#92400e" opacity="0.5"/>
  <!-- Mud splatter dots -->
  <circle cx="55" cy="50" r="2" fill="#92400e" opacity="0.6"/>
  <circle cx="60" cy="47" r="1.5" fill="#92400e" opacity="0.5"/>
  <circle cx="38" cy="38" r="1.5" fill="#92400e" opacity="0.5"/>

  <!-- Sauce/red stain -->
  <ellipse cx="65" cy="58" rx="7" ry="5" fill="#ef4444" opacity="0.7"/>
  <ellipse cx="70" cy="54" rx="4" ry="3" fill="#ef4444" opacity="0.5"/>
  <!-- Red drip -->
  <path d="M67 63 Q68 68 66 70" stroke="#ef4444" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Black/grease stain -->
  <ellipse cx="52" cy="38" rx="6" ry="4" fill="#1f2937" opacity="0.6"/>
  <ellipse cx="60" cy="35" rx="3" ry="2" fill="#1f2937" opacity="0.5"/>
  <!-- Black smear on sleeve -->
  <ellipse cx="20" cy="36" rx="4" ry="2" fill="#1f2937" opacity="0.5" transform="rotate(-20 20 36)"/>

  <!-- Small mud dots on right sleeve -->
  <circle cx="80" cy="32" r="2" fill="#92400e" opacity="0.5"/>
  <circle cx="83" cy="37" r="1.5" fill="#92400e" opacity="0.4"/>

</svg>
