<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ombra -->
  <ellipse cx="50" cy="95" rx="22" ry="4" fill="#a0aec0" opacity="0.3"/>
  <!-- Cos del brik (forma trapezoïdal lleugera) -->
  <rect x="24" y="32" width="52" height="58" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Part superior triangular (gable top) -->
  <polygon points="24,32 50,14 76,32" fill="#3b82f6"/>
  <polygon points="24,32 50,22 76,32 50,32" fill="#60a5fa"/>
  <!-- Franja blava superior -->
  <rect x="24" y="32" width="52" height="12" fill="#3b82f6"/>
  <!-- Franja blava inferior -->
  <rect x="24" y="74" width="52" height="16" rx="0 0 3 3" fill="#3b82f6"/>
  <!-- Etiqueta blanca central -->
  <rect x="28" y="46" width="44" height="26" rx="2" fill="#f0f9ff"/>
  <!-- Gota de llet -->
  <path d="M50 68 Q54 60 50 53 Q46 60 50 68 Z" fill="#3b82f6"/>
  <!-- Text LLET -->
  <text x="50" y="80" text-anchor="middle" font-size="9" font-weight="bold" fill="white" font-family="Arial, sans-serif">LLET</text>
</svg>
