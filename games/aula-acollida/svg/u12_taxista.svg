<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cartell TAXI al capdamunt -->
  <rect x="28" y="6" width="44" height="16" rx="4" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <text x="50" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e1b4b" font-family="Arial, sans-serif">TAXI</text>
  <!-- Cap -->
  <circle cx="50" cy="46" r="17" fill="#fde68a" stroke="#f0c060" stroke-width="1"/>
  <!-- Gorra de taxista -->
  <rect x="33" y="34" width="34" height="9" rx="4.5" fill="#1e3a5f"/>
  <rect x="28" y="39" width="8" height="4" rx="2" fill="#1e3a5f"/>
  <rect x="64" y="39" width="8" height="4" rx="2" fill="#1e3a5f"/>
  <!-- Ulls -->
  <circle cx="43" cy="46" r="2.8" fill="#374151"/>
  <circle cx="57" cy="46" r="2.8" fill="#374151"/>
  <circle cx="44" cy="45" r="1" fill="white"/>
  <circle cx="58" cy="45" r="1" fill="white"/>
  <!-- Somriure -->
  <path d="M42 53 Q50 59 58 53" fill="none" stroke="#c0922a" stroke-width="2" stroke-linecap="round"/>
  <!-- Cos (uniforme) -->
  <path d="M28 64 Q50 58 72 64 L74 94 L26 94 Z" fill="#1e3a5f"/>
