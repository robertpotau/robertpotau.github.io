<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Body (very round, large) -->
  <ellipse cx="50" cy="65" rx="32" ry="26" fill="#d97706" stroke="#b45309" stroke-width="2"/>
  <!-- Belly (lighter) -->
  <ellipse cx="50" cy="70" rx="18" ry="16" fill="#fef3c7"/>
  <!-- Head (large, round) -->
  <circle cx="50" cy="40" r="24" fill="#d97706" stroke="#b45309" stroke-width="2"/>
  <!-- Cheek pouches (characteristic hamster feature) -->
  <circle cx="26" cy="48" r="13" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <circle cx="74" cy="48" r="13" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <!-- Ears (small, round) -->
  <circle cx="32" cy="20" r="8" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>
  <circle cx="68" cy="20" r="8" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>
  <!-- Inner ears -->
  <circle cx="32" cy="20" r="4" fill="#fbbf24"/>
  <circle cx="68" cy="20" r="4" fill="#fbbf24"/>
  <!-- Eyes (black, shiny) -->
  <circle cx="42" cy="36" r="4" fill="#1f2937"/>
  <circle cx="58" cy="36" r="4" fill="#1f2937"/>
  <!-- Eye shine -->
  <circle cx="43.5" cy="34.5" r="1.5" fill="white"/>
  <circle cx="59.5" cy="34.5" r="1.5" fill="white"/>
  <!-- Nose (small) -->
  <ellipse cx="50" cy="44" rx="3" ry="2" fill="#f87171"/>
  <!-- Mouth -->
  <path d="M47 46 Q50 49 53 46" fill="none" stroke="#b45309" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="53" y1="44" x2="68" y2="42" stroke="#78350f" stroke-width="1" opacity="0.6"/>
  <line x1="53" y1="46" x2="68" y2="47" stroke="#78350f" stroke-width="1" opacity="0.6"/>
  <line x1="47" y1="44" x2="32" y2="42" stroke="#78350f" stroke-width="1" opacity="0.6"/>
  <line x1="47" y1="46" x2="32" y2="47" stroke="#78350f" stroke-width="1" opacity="0.6"/>
  <!-- Tiny feet -->
  <ellipse cx="36" cy="88" rx="8" ry="4" fill="#fbbf24" stroke="#b45309" stroke-width="1"/>
  <ellipse cx="64" cy="88" rx="8" ry="4" fill="#fbbf24" stroke="#b45309" stroke-width="1"/>
  <!-- Label -->
</svg>
