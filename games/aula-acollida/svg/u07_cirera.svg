<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Stems joining at top -->
  <path d="M35 65 Q35 45 50 38 Q65 45 65 65" stroke="#15803d" stroke-width="2.5" fill="none"/>
  <!-- Left stem -->
  <path d="M35 65 Q34 70 35 75" stroke="#15803d" stroke-width="2" fill="none"/>
  <!-- Right stem -->
  <path d="M65 65 Q66 70 65 75" stroke="#15803d" stroke-width="2" fill="none"/>
  <!-- Leaf left -->
  <ellipse cx="25" cy="50" rx="10" ry="5" fill="#4ade80" transform="rotate(-30,25,50)"/>
  <line x1="35" y1="52" x2="18" y2="47" stroke="#16a34a" stroke-width="0.8"/>
  <!-- Leaf right -->
  <ellipse cx="75" cy="50" rx="10" ry="5" fill="#4ade80" transform="rotate(30,75,50)"/>
  <line x1="65" y1="52" x2="82" y2="47" stroke="#16a34a" stroke-width="0.8"/>
  <!-- Left cherry -->
  <circle cx="32" cy="78" r="12" fill="#dc2626"/>
  <circle cx="32" cy="78" r="12" fill="none" stroke="#b91c1c" stroke-width="0.5"/>
  <!-- Left cherry highlight -->
  <circle cx="27" cy="73" r="4" fill="#ef4444" opacity="0.6"/>
  <!-- Right cherry -->
  <circle cx="68" cy="78" r="12" fill="#dc2626"/>
  <circle cx="68" cy="78" r="12" fill="none" stroke="#b91c1c" stroke-width="0.5"/>
  <!-- Right cherry highlight -->
  <circle cx="63" cy="73" r="4" fill="#ef4444" opacity="0.6"/>
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">CIRERA</text>
</svg>
