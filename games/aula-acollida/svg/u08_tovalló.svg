<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Tovalló plegat en triangle amb anell -->
  <!-- Anell de servilleter (anell daurat) -->
  <ellipse cx="50" cy="52" rx="14" ry="10" fill="none" stroke="#d97706" stroke-width="5"/>
  <ellipse cx="50" cy="52" rx="14" ry="10" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <!-- Part del tovalló que surt per dalt de l'anell -->
  <path d="M 36 42 L 50 8 L 64 42 Z" fill="#f5f5f5"/>
  <path d="M 37 42 L 50 10 L 63 42 Z" fill="white"/>
  <!-- Plecs del tovalló (línies de doblat) -->
  <line x1="43" y1="36" x2="50" y2="20" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="57" y1="36" x2="50" y2="20" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="44" y1="42" x2="56" y2="42" stroke="#d1d5db" stroke-width="1"/>
  <!-- Part del tovalló que surt per baix de l'anell -->
  <path d="M 36 62 L 42 88 L 58 88 L 64 62 Z" fill="#f5f5f5"/>
  <path d="M 37 62 L 43 86 L 57 86 L 63 62 Z" fill="white"/>
  <!-- Plecs de baix -->
  <line x1="45" y1="65" x2="43" y2="85" stroke="#d1d5db" stroke-width="1"/>
  <line x1="55" y1="65" x2="57" y2="85" stroke="#d1d5db" stroke-width="1"/>
  <!-- Label -->
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">TOVALLÓ</text>
</svg>
