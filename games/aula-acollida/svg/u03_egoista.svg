<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Figure hoarding stuff -->
  <!-- Body -->
  <rect x="36" y="46" width="18" height="24" rx="3" fill="#6b7280"/>
  <!-- Head -->
  <circle cx="45" cy="34" r="13" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <!-- Angry frown -->
  <path d="M36 42 Q45 37 54 42" stroke="#c2850a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Angry eyebrows (down-slanted) -->
  <line x1="33" y1="29" x2="40" y2="32" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="57" y1="29" x2="50" y2="32" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="37" cy="35" r="2.5" fill="#374151"/>
  <circle cx="53" cy="35" r="2.5" fill="#374151"/>
  <!-- Arms clutching items -->
  <path d="M36 52 Q24 50 20 60 Q22 66 28 62" stroke="#6b7280" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M54 52 Q66 50 70 60 Q68 66 62 62" stroke="#6b7280" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Items being hoarded -->
  <rect x="12" y="58" width="16" height="12" rx="2" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <rect x="62" y="58" width="16" height="12" rx="2" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
  <!-- "MEVA!" text -->
  <text x="20" y="55" font-family="Arial,sans-serif" font-size="7" fill="#ef4444" font-weight="700" text-anchor="middle">MEVA!</text>
  <text x="70" y="55" font-family="Arial,sans-serif" font-size="7" fill="#ef4444" font-weight="700" text-anchor="middle">MEVA!</text>
  <!-- Legs -->
  <rect x="36" y="70" width="7" height="10" rx="2" fill="#4b5563"/>
  <rect x="47" y="70" width="7" height="10" rx="2" fill="#4b5563"/>
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">EGOISTA</text>
</svg>
