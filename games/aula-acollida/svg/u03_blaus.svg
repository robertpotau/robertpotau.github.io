<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Large eye -->
  <ellipse cx="50" cy="48" rx="38" ry="26" fill="white" stroke="#374151" stroke-width="2.5"/>
  <!-- Iris - blue -->
  <circle cx="50" cy="48" r="18" fill="#2563eb"/>
  <!-- Iris detail -->
  <circle cx="50" cy="48" r="16" fill="#3b82f6"/>
  <!-- Iris lines -->
  <line x1="50" y1="32" x2="50" y2="64" stroke="#1d4ed8" stroke-width="1" opacity="0.5"/>
  <line x1="34" y1="48" x2="66" y2="48" stroke="#1d4ed8" stroke-width="1" opacity="0.5"/>
  <line x1="38" y1="36" x2="62" y2="60" stroke="#1d4ed8" stroke-width="1" opacity="0.4"/>
  <line x1="62" y1="36" x2="38" y2="60" stroke="#1d4ed8" stroke-width="1" opacity="0.4"/>
  <!-- Pupil -->
  <circle cx="50" cy="48" r="8" fill="#1a1a1a"/>
  <!-- Shine -->
  <circle cx="44" cy="42" r="4" fill="white" opacity="0.7"/>
  <!-- Eyelashes -->
  <line x1="20" y1="42" x2="16" y2="36" stroke="#374151" stroke-width="2"/>
  <line x1="28" y1="36" x2="26" y2="28" stroke="#374151" stroke-width="2"/>
  <line x1="38" y1="30" x2="38" y2="22" stroke="#374151" stroke-width="2"/>
  <line x1="50" y1="26" x2="50" y2="18" stroke="#374151" stroke-width="2"/>
  <line x1="62" y1="30" x2="62" y2="22" stroke="#374151" stroke-width="2"/>
  <line x1="72" y1="36" x2="74" y2="28" stroke="#374151" stroke-width="2"/>
  <line x1="80" y1="42" x2="84" y2="36" stroke="#374151" stroke-width="2"/>
</svg>
