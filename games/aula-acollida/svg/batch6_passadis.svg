<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Passadís en perspectiva cònica, reconeixible amb terra, parets i sostre -->

  <!-- Sostre (gris clar) -->
  <polygon points="0,0 100,0 68,32 32,32" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <!-- Paret esquerra -->
  <polygon points="0,0 32,32 32,75 0,100" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1"/>
  <!-- Paret dreta -->
  <polygon points="100,0 68,32 68,75 100,100" fill="#b0bec5" stroke="#94a3b8" stroke-width="1"/>
  <!-- Terra -->
  <polygon points="0,100 100,100 68,75 32,75" fill="#d9c9a0" stroke="#a89060" stroke-width="1"/>

  <!-- Fons del passadís (paret del fons) -->
  <rect x="32" y="32" width="36" height="43" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>

  <!-- Línies de perspectiva del terra (rajoles) -->
  <line x1="0" y1="100" x2="50" y2="75" stroke="#a89060" stroke-width="0.8" opacity="0.7"/>
  <line x1="100" y1="100" x2="50" y2="75" stroke="#a89060" stroke-width="0.8" opacity="0.7"/>
  <line x1="25" y1="100" x2="40" y2="75" stroke="#a89060" stroke-width="0.8" opacity="0.5"/>
  <line x1="75" y1="100" x2="60" y2="75" stroke="#a89060" stroke-width="0.8" opacity="0.5"/>
  <line x1="0" y1="87" x2="32" y2="75" stroke="#a89060" stroke-width="0.5" opacity="0.5"/>
  <line x1="100" y1="87" x2="68" y2="75" stroke="#a89060" stroke-width="0.5" opacity="0.5"/>

  <!-- Porta al fons del passadís -->
  <rect x="39" y="44" width="22" height="31" rx="2" fill="#8B6914" stroke="#6b4f0e" stroke-width="1.5"/>
  <!-- Vidret de la porta -->
  <rect x="44" y="48" width="12" height="10" rx="1" fill="#bfdbfe" stroke="#6b4f0e" stroke-width="0.8"/>
  <!-- Pom de la porta -->
  <circle cx="58" cy="62" r="2" fill="#d97706"/>

  <!-- Llum de sostre -->
  <ellipse cx="50" cy="20" rx="6" ry="4" fill="#fef08a" stroke="#d97706" stroke-width="1"/>
  <line x1="50" y1="24" x2="50" y2="32" stroke="#d97706" stroke-width="1"/>
</svg>
