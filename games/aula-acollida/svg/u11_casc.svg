<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cos principal del casc (semiesfèric) -->
  <path d="M15 62 Q15 20 50 16 Q85 20 85 62 Z" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
  <!-- Franja inferior del casc -->
  <rect x="15" y="60" width="70" height="10" rx="2" fill="#b91c1c"/>
  <!-- Visera transparent -->
  <path d="M20 60 Q22 72 35 76 L65 76 Q78 72 80 60 Z" fill="#bae6fd" stroke="#7dd3fc" stroke-width="1.5" opacity="0.8"/>
  <!-- Ventilació superior -->
  <rect x="38" y="18" width="8" height="16" rx="2" fill="#b91c1c"/>
  <rect x="50" y="17" width="8" height="16" rx="2" fill="#b91c1c"/>
  <!-- Brillantor casc -->
  <ellipse cx="34" cy="30" rx="8" ry="5" fill="#fca5a5" opacity="0.5" transform="rotate(-20 34 30)"/>
  <!-- Label -->
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">CASC</text>
</svg>
