<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Faucet body -->
  <rect x="38" y="30" width="24" height="12" rx="6" fill="#9ca3af" stroke="#6b7280" stroke-width="2"/>
  <!-- Spout going down -->
  <path d="M50 42 Q50 52 44 58 Q38 64 38 72" stroke="#9ca3af" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M50 42 Q50 52 44 58 Q38 64 38 72" stroke="#d1d5db" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- Handle/knob -->
  <rect x="30" y="26" width="18" height="8" rx="4" fill="#6b7280" stroke="#4b5563" stroke-width="2"/>
  <rect x="52" y="26" width="18" height="8" rx="4" fill="#6b7280" stroke="#4b5563" stroke-width="2"/>
  <!-- Hot/cold labels -->
  <text x="39" y="24" font-family="Arial,sans-serif" font-size="8" fill="#ef4444" font-weight="700">C</text>
  <text x="61" y="24" font-family="Arial,sans-serif" font-size="8" fill="#3b82f6" font-weight="700">F</text>
  <!-- Water stream -->
  <path d="M36 74 Q34 80 36 86" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M40 76 Q38 82 40 88" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M44 74 Q42 80 44 86" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Sink basin -->
  <path d="M10 80 Q10 96 50 96 Q90 96 90 80 L86 70 Q86 68 82 68 L18 68 Q14 68 14 70 Z" fill="#f1f5f9" stroke="#9ca3af" stroke-width="2"/>
</svg>
