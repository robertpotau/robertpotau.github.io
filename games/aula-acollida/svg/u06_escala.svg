<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Barana esquerra -->
  <line x1="12" y1="20" x2="12" y2="78" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
  <!-- Barana dreta -->
  <line x1="88" y1="20" x2="88" y2="78" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
  <!-- Graons (5) de baix a dalt, vista lateral -->
  <!-- Graó 1 (baix) -->
  <rect x="12" y="68" width="76" height="8" rx="2" fill="#d97706"/>
  <!-- Graó 2 -->
  <rect x="22" y="58" width="66" height="8" rx="2" fill="#d97706"/>
  <!-- Graó 3 -->
  <rect x="32" y="48" width="56" height="8" rx="2" fill="#d97706"/>
  <!-- Graó 4 -->
  <rect x="42" y="38" width="46" height="8" rx="2" fill="#d97706"/>
  <!-- Graó 5 (dalt) -->
  <rect x="52" y="28" width="36" height="8" rx="2" fill="#d97706"/>
  <!-- Contorn dels graons (costats) -->
  <line x1="22" y1="68" x2="22" y2="76" stroke="#b45309" stroke-width="1.5"/>
  <line x1="32" y1="58" x2="32" y2="66" stroke="#b45309" stroke-width="1.5"/>
  <line x1="42" y1="48" x2="42" y2="56" stroke="#b45309" stroke-width="1.5"/>
  <line x1="52" y1="38" x2="52" y2="46" stroke="#b45309" stroke-width="1.5"/>
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">ESCALA</text>
</svg>
