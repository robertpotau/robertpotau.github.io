<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Andana -->
  <rect x="5" y="74" width="90" height="8" rx="2" fill="#94a3b8" stroke="#64748b" stroke-width="1"/>
  <!-- Cos edifici principal -->
  <rect x="10" y="40" width="80" height="36" rx="3" fill="#94a3b8" stroke="#64748b" stroke-width="1.5"/>
  <!-- Teulada central (gable) -->
  <polygon points="50,20 14,40 86,40" fill="#64748b" stroke="#475569" stroke-width="1.5"/>
  <!-- Ales laterals edifici (ales més baixes) -->
  <rect x="5" y="52" width="18" height="24" rx="2" fill="#94a3b8" stroke="#64748b" stroke-width="1"/>
  <rect x="77" y="52" width="18" height="24" rx="2" fill="#94a3b8" stroke="#64748b" stroke-width="1"/>
  <!-- Finestres edifici -->
  <rect x="20" y="50" width="12" height="14" rx="2" fill="#bae6fd" stroke="#38bdf8" stroke-width="1"/>
  <rect x="68" y="50" width="12" height="14" rx="2" fill="#bae6fd" stroke="#38bdf8" stroke-width="1"/>
  <!-- Portal central -->
  <rect x="42" y="54" width="16" height="22" rx="3" fill="#78350f" stroke="#92400e" stroke-width="1"/>
  <path d="M42 60 Q50 56 58 60" fill="none" stroke="#92400e" stroke-width="1.2"/>
  <!-- Rellotge central gran -->
  <circle cx="50" cy="38" rx="10" r="10" fill="#f5f5f5" stroke="#64748b" stroke-width="2"/>
  <circle cx="50" cy="38" r="8" fill="#f5f5f5"/>
  <!-- Esfera rellotge -->
  <circle cx="50" cy="38" r="1.5" fill="#1f2937"/>
  <!-- Agulles rellotge -->
  <line x1="50" y1="38" x2="50" y2="32" stroke="#1f2937" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="50" y1="38" x2="55" y2="40" stroke="#1f2937" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Marques hora rellotge -->
  <line x1="50" y1="30.5" x2="50" y2="32.5" stroke="#374151" stroke-width="1"/>
  <line x1="50" y1="43.5" x2="50" y2="45.5" stroke="#374151" stroke-width="1"/>
  <line x1="42.5" y1="38" x2="44.5" y2="38" stroke="#374151" stroke-width="1"/>
  <line x1="55.5" y1="38" x2="57.5" y2="38" stroke="#374151" stroke-width="1"/>
  <!-- Signe estació (lletra "E" o "ESTACIÓ") -->
  <rect x="36" y="26" width="28" height="10" rx="2" fill="#1e40af"/>
  <text x="50" y="34" font-family="Arial,sans-serif" font-size="7" fill="#f5f5f5" font-weight="700" text-anchor="middle">ESTACIÓ</text>
  <!-- Pilars edifici -->
  <rect x="18" y="40" width="4" height="36" fill="#64748b"/>
  <rect x="78" y="40" width="4" height="36" fill="#64748b"/>
  <!-- Rails a l'andana -->
  <line x1="5" y1="82" x2="95" y2="82" stroke="#374151" stroke-width="2"/>
  <line x1="5" y1="85" x2="95" y2="85" stroke="#374151" stroke-width="1.5"/>
  <!-- Label -->
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">ESTACIÓ</text>
</svg>
