  <line x1="63" y1="89" x2="59" y2="91" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="63" y1="89" x2="63" y2="93" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
