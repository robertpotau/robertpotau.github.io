  <line x1="52" y1="78" x2="50" y2="84" stroke="#92400e" stroke-width="2"/>
  <line x1="57" y1="80" x2="56" y2="86" stroke="#92400e" stroke-width="2"/>
  <line x1="64" y1="82" x2="64" y2="88" stroke="#92400e" stroke-width="2"/>
  <line x1="71" y1="80" x2="72" y2="86" stroke="#92400e" stroke-width="2"/>
  <line x1="76" y1="78" x2="78" y2="84" stroke="#92400e" stroke-width="2"/>
  <!-- Cames -->
  <rect x="29" y="65" width="10" height="22" rx="3" fill="#f97316"/>
  <rect x="43" y="65" width="10" height="22" rx="3" fill="#f97316"/>
