  <line x1="85" y1="44.5" x2="85" y2="48.5" stroke="#7c3aed" stroke-width="0.8"/>
  <line x1="87" y1="44.5" x2="87" y2="48.5" stroke="#7c3aed" stroke-width="0.8"/>
