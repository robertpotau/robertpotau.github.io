  <rect x="26" y="76" width="8" height="3" rx="1" fill="#9ca3af"/>
  <rect x="36" y="76" width="8" height="3" rx="1" fill="#9ca3af"/>
  <rect x="46" y="76" width="8" height="3" rx="1" fill="#9ca3af"/>
  <rect x="56" y="76" width="8" height="3" rx="1" fill="#9ca3af"/>
  <rect x="30" y="81" width="40" height="3" rx="1" fill="#9ca3af"/>
