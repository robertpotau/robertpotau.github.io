<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Caixa de càrrega gran -->
  <rect x="8" y="38" width="55" height="32" rx="2" fill="#6b7280" stroke="#4b5563" stroke-width="1.5"/>
  <!-- Cabina davant -->
  <rect x="63" y="44" width="24" height="26" rx="3" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
  <!-- Finestra cabina -->
  <rect x="67" y="47" width="16" height="10" rx="2" fill="#bae6fd" stroke="#3b82f6" stroke-width="1"/>
  <!-- Porta cabina -->
  <rect x="73" y="57" width="8" height="11" rx="1" fill="#dc2626" stroke="#b91c1c" stroke-width="0.8"/>
  <circle cx="73" cy="63" r="1.2" fill="#fde047"/>
  <!-- Unió cabina-caixa -->
  <rect x="60" y="50" width="5" height="20" fill="#ef4444"/>
  <!-- Rodes -->
  <circle cx="22" cy="73" r="9" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
  <circle cx="22" cy="73" r="5" fill="#4b5563"/>
  <circle cx="22" cy="73" r="2" fill="#6b7280"/>
  <circle cx="48" cy="73" r="9" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
  <circle cx="48" cy="73" r="5" fill="#4b5563"/>
  <circle cx="48" cy="73" r="2" fill="#6b7280"/>
  <circle cx="78" cy="73" r="9" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
  <circle cx="78" cy="73" r="5" fill="#4b5563"/>
  <circle cx="78" cy="73" r="2" fill="#6b7280"/>
  <!-- Xapa lateral caixa -->
  <line x1="8" y1="54" x2="63" y2="54" stroke="#4b5563" stroke-width="1"/>
  <!-- Llum davantera -->
  <rect x="85" y="52" width="5" height="4" rx="1" fill="#fde047"/>
  <!-- Label -->
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">CAMIÓ</text>
</svg>
