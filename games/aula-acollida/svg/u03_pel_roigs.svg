<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Head -->
  <circle cx="50" cy="46" r="26" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <!-- Red/orange hair -->
  <path d="M24 40 Q22 20 34 14 Q44 8 50 10 Q58 8 66 14 Q78 20 76 40" fill="#ea580c"/>
  <!-- Hair detail -->
  <path d="M24 40 Q26 28 34 22" stroke="#f97316" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M76 40 Q74 28 66 22" stroke="#f97316" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Freckles -->
  <circle cx="38" cy="50" r="2" fill="#f97316" opacity="0.7"/>
  <circle cx="44" cy="53" r="1.5" fill="#f97316" opacity="0.7"/>
  <circle cx="56" cy="53" r="1.5" fill="#f97316" opacity="0.7"/>
  <circle cx="62" cy="50" r="2" fill="#f97316" opacity="0.7"/>
  <!-- Eyes (green, typical for redheads) -->
  <ellipse cx="38" cy="44" rx="6" ry="5" fill="white" stroke="#374151" stroke-width="1.5"/>
  <ellipse cx="62" cy="44" rx="6" ry="5" fill="white" stroke="#374151" stroke-width="1.5"/>
  <circle cx="38" cy="44" r="3" fill="#16a34a"/>
  <circle cx="62" cy="44" r="3" fill="#16a34a"/>
  <circle cx="38" cy="44" r="1.5" fill="#1a1a1a"/>
  <circle cx="62" cy="44" r="1.5" fill="#1a1a1a"/>
  <!-- Nose -->
  <path d="M46 54 Q50 58 54 54" stroke="#c2850a" stroke-width="1.5" fill="none"/>
  <!-- Smile -->
  <path d="M40 63 Q50 69 60 63" stroke="#c2850a" stroke-width="2" fill="none"/>
</svg>
