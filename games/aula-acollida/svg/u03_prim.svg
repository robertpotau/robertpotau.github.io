<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Slim figure -->
  <circle cx="50" cy="16" r="10" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <!-- Narrow neck -->
  <rect x="46" y="26" width="8" height="8" rx="2" fill="#ffd68a"/>
  <!-- Very slim torso -->
  <path d="M44 34 Q40 42 40 56 Q40 64 44 66 L56 66 Q60 64 60 56 Q60 42 56 34 Z" fill="#22d3ee"/>
  <!-- Waist very narrow -->
  <path d="M42 50 Q50 46 58 50" stroke="#06b6d4" stroke-width="1.5" fill="none"/>
  <!-- Slim legs -->
  <rect x="43" y="66" width="6" height="18" rx="3" fill="#1e40af"/>
  <rect x="51" y="66" width="6" height="18" rx="3" fill="#1e40af"/>
  <!-- Arms (thin) -->
  <line x1="44" y1="38" x2="32" y2="52" stroke="#22d3ee" stroke-width="4" stroke-linecap="round"/>
  <line x1="56" y1="38" x2="68" y2="52" stroke="#22d3ee" stroke-width="4" stroke-linecap="round"/>
  <!-- Face -->
  <circle cx="44" cy="14" r="2" fill="#374151"/>
  <circle cx="56" cy="14" r="2" fill="#374151"/>
  <path d="M44 19 Q50 22 56 19" stroke="#c2850a" stroke-width="1.5" fill="none"/>
  <!-- Width arrows showing narrow -->
  <line x1="36" y1="50" x2="64" y2="50" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">PRIM</text>
</svg>
