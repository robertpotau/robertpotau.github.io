  <rect x="31" y="63" width="4" height="3" fill="#94a3b8"/>
  <!-- Corba esquerra -->
  <path d="M20 35 Q6 35 6 50 Q6 65 20 65" fill="none" stroke="#374151" stroke-width="6"/>
