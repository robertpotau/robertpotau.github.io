<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shop front -->
  <rect x="8" y="28" width="84" height="66" rx="4" fill="#fef9f0" stroke="#78350f" stroke-width="2.5"/>
  <!-- Awning -->
  <path d="M4 28 L96 28 L92 16 L8 16 Z" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <!-- Awning stripes -->
  <line x1="20" y1="16" x2="16" y2="28" stroke="#fde68a" stroke-width="3"/>
  <line x1="36" y1="16" x2="32" y2="28" stroke="#fde68a" stroke-width="3"/>
  <line x1="52" y1="16" x2="48" y2="28" stroke="#fde68a" stroke-width="3"/>
  <line x1="68" y1="16" x2="64" y2="28" stroke="#fde68a" stroke-width="3"/>
  <line x1="84" y1="16" x2="80" y2="28" stroke="#fde68a" stroke-width="3"/>
  <!-- Sign -->
  <rect x="20" y="6" width="60" height="12" rx="3" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <text x="50" y="15" font-family="Arial,sans-serif" font-size="7" font-weight="700" fill="#7c2d12" text-anchor="middle">CARNISSERIA</text>
  <!-- Window with meat display -->
  <rect x="14" y="34" width="34" height="28" rx="3" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Meat in window -->
  <ellipse cx="24" cy="50" rx="7" ry="5" fill="#c2410c" stroke="#7c2d12" stroke-width="1"/>
  <ellipse cx="38" cy="48" rx="6" ry="4" fill="#dc2626" stroke="#7c2d12" stroke-width="1"/>
  <!-- Door -->
  <rect x="54" y="48" width="28" height="46" rx="3" fill="#f5e6d0" stroke="#78350f" stroke-width="2"/>
  <!-- Door handle -->
  <circle cx="58" cy="72" r="2.5" fill="#92400e"/>
</svg>
