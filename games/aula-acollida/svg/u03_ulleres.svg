<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left lens -->
  <circle cx="30" cy="48" r="18" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <circle cx="30" cy="48" r="13" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <!-- Right lens -->
  <circle cx="70" cy="48" r="18" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <circle cx="70" cy="48" r="13" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <!-- Bridge -->
  <path d="M43 48 Q50 44 57 48" stroke="#1d4ed8" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Left arm -->
  <line x1="12" y1="48" x2="8" y2="45" stroke="#1d4ed8" stroke-width="3" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="88" y1="48" x2="92" y2="45" stroke="#1d4ed8" stroke-width="3" stroke-linecap="round"/>
  <!-- Lens shine -->
  <circle cx="24" cy="42" r="3" fill="white" opacity="0.7"/>
  <circle cx="64" cy="42" r="3" fill="white" opacity="0.7"/>
</svg>
