<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Belt strap - left of buckle -->
  <rect x="8" y="42" width="30" height="14" rx="3" fill="#92400e"/>
  <!-- Belt strap - right of buckle -->
  <rect x="62" y="42" width="28" height="14" rx="3" fill="#92400e"/>
  <!-- Buckle frame -->
  <rect x="36" y="38" width="28" height="22" rx="3" fill="#94a3b8" stroke="#64748b" stroke-width="1.5"/>
  <!-- Buckle inner (hollow) -->
  <rect x="40" y="42" width="20" height="14" rx="2" fill="#e2e8f0"/>
  <!-- Buckle prong/pin -->
  <rect x="49" y="38" width="2.5" height="22" rx="1" fill="#64748b"/>
  <!-- Belt holes (right side) -->
  <circle cx="72" cy="49" r="2" fill="#78350f"/>
  <circle cx="80" cy="49" r="2" fill="#78350f"/>
  <circle cx="88" cy="49" r="2" fill="#78350f"/>
  <!-- Belt texture lines (left) -->
  <line x1="12" y1="46" x2="35" y2="46" stroke="#78350f" stroke-width="0.8" opacity="0.6"/>
  <line x1="12" y1="49" x2="35" y2="49" stroke="#78350f" stroke-width="0.8" opacity="0.6"/>
  <line x1="12" y1="52" x2="35" y2="52" stroke="#78350f" stroke-width="0.8" opacity="0.6"/>
  <!-- Belt texture lines (right) -->
  <line x1="63" y1="46" x2="88" y2="46" stroke="#78350f" stroke-width="0.8" opacity="0.6"/>
  <line x1="63" y1="49" x2="88" y2="49" stroke="#78350f" stroke-width="0.8" opacity="0.6"/>
  <line x1="63" y1="52" x2="88" y2="52" stroke="#78350f" stroke-width="0.8" opacity="0.6"/>
  <!-- Tip of belt (left end pointed) -->
  <path d="M8 42 L4 49 L8 56 Z" fill="#92400e"/>

</svg>
