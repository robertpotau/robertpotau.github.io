<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#fef9f0" rx="12"/>
  <!-- Sausage curved shape -->
  <path d="M20 55 Q18 38 35 30 Q55 22 70 35 Q85 48 78 62 Q70 76 55 72 Q35 68 20 55 Z" fill="#92400e" stroke="#78350f" stroke-width="2.5"/>
  <!-- Highlight/sheen -->
  <path d="M28 45 Q32 35 48 32 Q62 30 68 40" fill="none" stroke="#d97706" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- End tie (knot) left -->
  <ellipse cx="20" cy="55" rx="5" ry="4" fill="#78350f" stroke="#57270b" stroke-width="1.5"/>
  <!-- End tie right -->
  <ellipse cx="78" cy="62" rx="5" ry="4" fill="#78350f" stroke="#57270b" stroke-width="1.5"/>
  <!-- Grill marks / texture lines -->
  <path d="M38 62 Q42 48 52 44" fill="none" stroke="#78350f" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M48 67 Q54 54 62 50" fill="none" stroke="#78350f" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Fork -->
  <line x1="72" y1="28" x2="72" y2="48" stroke="#9ca3af" stroke-width="3" stroke-linecap="round"/>
  <line x1="66" y1="22" x2="66" y2="38" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="72" y1="22" x2="72" y2="38" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="78" y1="22" x2="78" y2="38" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M64 38 Q71 43 80 38" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
  <!-- Label -->
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">BOTIFARRA</text>
</svg>
