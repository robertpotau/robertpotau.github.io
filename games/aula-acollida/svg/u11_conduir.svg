<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Volant (mig cercle vist des de darrere/davant) -->
  <!-- Cercle exterior volant -->
  <circle cx="50" cy="52" r="36" fill="none" stroke="#374151" stroke-width="7"/>
  <!-- Radis del volant -->
  <line x1="50" y1="52" x2="50" y2="20" stroke="#374151" stroke-width="5" stroke-linecap="round"/>
  <line x1="50" y1="52" x2="22" y2="68" stroke="#374151" stroke-width="5" stroke-linecap="round"/>
  <line x1="50" y1="52" x2="78" y2="68" stroke="#374151" stroke-width="5" stroke-linecap="round"/>
  <!-- Centre volant -->
  <circle cx="50" cy="52" r="8" fill="#374151"/>
  <!-- Mans sobre el volant -->
  <!-- Mà esquerra (a les 9h) -->
  <ellipse cx="17" cy="52" rx="9" ry="7" fill="#f5cba7" stroke="#d4a574" stroke-width="1.5"/>
  <line x1="14" y1="48" x2="14" y2="56" stroke="#d4a574" stroke-width="1.5"/>
  <line x1="18" y1="46" x2="18" y2="57" stroke="#d4a574" stroke-width="1.5"/>
  <line x1="22" y1="48" x2="22" y2="56" stroke="#d4a574" stroke-width="1.5"/>
  <!-- Mà dreta (a les 3h) -->
  <ellipse cx="83" cy="52" rx="9" ry="7" fill="#f5cba7" stroke="#d4a574" stroke-width="1.5"/>
  <line x1="80" y1="48" x2="80" y2="56" stroke="#d4a574" stroke-width="1.5"/>
  <line x1="84" y1="46" x2="84" y2="57" stroke="#d4a574" stroke-width="1.5"/>
  <line x1="88" y1="48" x2="88" y2="56" stroke="#d4a574" stroke-width="1.5"/>
  <!-- Label -->
</svg>
