  <ellipse cx="62" cy="44" rx="6" ry="5" fill="white" stroke="#374151" stroke-width="1.5"/>
  <circle cx="38" cy="44" r="2.5" fill="#374151"/>
  <circle cx="62" cy="44" r="2.5" fill="#374151"/>
  <path d="M44 55 Q50 60 56 55" stroke="#c2850a" stroke-width="1.5" fill="none"/>
  <!-- Razor icon small -->
  <rect x="68" y="68" width="16" height="8" rx="2" fill="#9ca3af" stroke="#6b7280" stroke-width="1"/>
  <rect x="66" y="72" width="4" height="4" rx="1" fill="#374151"/>
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">RAPATS</text>
