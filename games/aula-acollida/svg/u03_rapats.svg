<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Smooth shaved head -->
  <circle cx="50" cy="45" r="30" fill="#ffd68a" stroke="#d97706" stroke-width="2"/>
  <!-- Slight stubble texture -->
  <circle cx="35" cy="24" r="1.5" fill="#9ca3af" opacity="0.5"/>
  <circle cx="42" cy="20" r="1.5" fill="#9ca3af" opacity="0.5"/>
  <circle cx="50" cy="18" r="1.5" fill="#9ca3af" opacity="0.5"/>
  <circle cx="58" cy="20" r="1.5" fill="#9ca3af" opacity="0.5"/>
  <circle cx="65" cy="24" r="1.5" fill="#9ca3af" opacity="0.5"/>
  <circle cx="70" cy="30" r="1.5" fill="#9ca3af" opacity="0.5"/>
  <circle cx="30" cy="30" r="1.5" fill="#9ca3af" opacity="0.5"/>
  <!-- Shine on head -->
  <ellipse cx="40" cy="30" rx="8" ry="5" fill="white" opacity="0.3"/>
