<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 5 fingers spread out -->
  <!-- Thumb -->
  <rect x="12" y="42" width="12" height="28" rx="6" fill="#ffd68a" stroke="#d97706" stroke-width="1.5" transform="rotate(-20 18 56)"/>
  <!-- Index -->
  <rect x="26" y="26" width="12" height="36" rx="6" fill="#ffd68a" stroke="#d97706" stroke-width="1.5" transform="rotate(-8 32 44)"/>
  <!-- Middle -->
  <rect x="40" y="22" width="12" height="40" rx="6" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <!-- Ring -->
  <rect x="54" y="25" width="12" height="38" rx="6" fill="#ffd68a" stroke="#d97706" stroke-width="1.5" transform="rotate(8 60 44)"/>
  <!-- Pinky -->
  <rect x="68" y="36" width="10" height="28" rx="5" fill="#ffd68a" stroke="#d97706" stroke-width="1.5" transform="rotate(18 73 50)"/>
  <!-- Palm connecting area -->
  <rect x="18" y="62" width="58" height="18" rx="6" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <!-- Finger count dots/numbers -->
  <circle cx="20" cy="58" r="4" fill="#ef4444"/>
  <circle cx="32" cy="42" r="4" fill="#f97316"/>
  <circle cx="46" cy="38" r="4" fill="#eab308"/>
  <circle cx="61" cy="42" r="4" fill="#16a34a"/>
  <circle cx="75" cy="52" r="4" fill="#3b82f6"/>
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">DITS</text>
</svg>
