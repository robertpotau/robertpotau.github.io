  <!-- Neck opening fill -->
  <path d="M40 38 L50 52 L60 38 L55 38 L50 48 L45 38 Z" fill="#fce7f3"/>
  <!-- Button placket -->
  <line x1="50" y1="52" x2="50" y2="76" stroke="#f472b6" stroke-width="1"/>
  <!-- Buttons -->
  <circle cx="50" cy="56" r="2" fill="#f5f5f5" stroke="#f472b6" stroke-width="0.8"/>
  <circle cx="50" cy="63" r="2" fill="#f5f5f5" stroke="#f472b6" stroke-width="0.8"/>
  <circle cx="50" cy="70" r="2" fill="#f5f5f5" stroke="#f472b6" stroke-width="0.8"/>
