  <!-- Side seams suggestion -->
  <line x1="22" y1="48" x2="18" y2="74" stroke="#f472b6" stroke-width="0.8" opacity="0.5"/>
  <line x1="78" y1="48" x2="82" y2="74" stroke="#f472b6" stroke-width="0.8" opacity="0.5"/>

  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">BRUSA</text>
</svg>
