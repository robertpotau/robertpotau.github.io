  <ellipse cx="75" cy="46" rx="12" ry="10" fill="#fbbf24" opacity="0.8"/>
  <!-- Neck -->
  <rect x="42" y="26" width="16" height="14" rx="4" fill="#ffd68a"/>
  <!-- Head -->
  <circle cx="50" cy="20" r="14" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <!-- Hair -->
  <path d="M36 15 Q36 6 50 5 Q64 6 64 15" fill="#92400e"/>
  <!-- Arrow to shoulder -->
  <line x1="88" y1="30" x2="80" y2="44" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="78" cy="46" r="4" fill="#ef4444"/>
</svg>
