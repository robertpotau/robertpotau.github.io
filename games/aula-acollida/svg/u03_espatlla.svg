<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Torso -->
  <path d="M25 45 Q18 50 16 80 L84 80 Q82 50 75 45 Q68 38 50 36 Q32 38 25 45 Z" fill="#3b82f6"/>
