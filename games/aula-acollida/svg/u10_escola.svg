<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Edifici principal -->
  <rect x="8" y="38" width="84" height="50" rx="2" fill="#fde047"/>
  <!-- Sostre triangular -->
  <polygon points="5,40 50,12 95,40" fill="#f59e0b"/>
  <!-- Asta de bandera -->
  <rect x="48" y="5" width="3" height="20" fill="#6b7280"/>
  <!-- Bandera -->
  <polygon points="51,6 68,11 51,16" fill="#ef4444"/>
  <!-- Porta central (arrodonida a dalt) -->
  <rect x="40" y="62" width="20" height="26" rx="2" fill="#92400e"/>
  <ellipse cx="50" cy="62" rx="10" ry="5" fill="#92400e"/>
  <!-- Pom porta -->
  <circle cx="57" cy="76" r="2" fill="#fbbf24"/>
  <!-- Finestres esquerra -->
  <rect x="14" y="47" width="14" height="12" rx="2" fill="#bae6fd"/>
  <line x1="21" y1="47" x2="21" y2="59" stroke="#7dd3fc" stroke-width="1"/>
  <line x1="14" y1="53" x2="28" y2="53" stroke="#7dd3fc" stroke-width="1"/>
  <!-- Finestres dreta -->
  <rect x="72" y="47" width="14" height="12" rx="2" fill="#bae6fd"/>
  <line x1="79" y1="47" x2="79" y2="59" stroke="#7dd3fc" stroke-width="1"/>
  <line x1="72" y1="53" x2="86" y2="53" stroke="#7dd3fc" stroke-width="1"/>
  <!-- Finestres planta alta esquerra -->
  <rect x="14" y="66" width="14" height="10" rx="2" fill="#bae6fd"/>
  <!-- Finestres planta alta dreta -->
  <rect x="72" y="66" width="14" height="10" rx="2" fill="#bae6fd"/>
  <!-- Text ESCOLA al frontons -->
  <text x="50" y="32" font-family="Arial,sans-serif" font-size="7" fill="#92400e" font-weight="800" text-anchor="middle">ESCOLA</text>
  <!-- Sòl -->
  <rect x="0" y="87" width="100" height="3" fill="#d1d5db"/>
  <!-- Label -->
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">ESCOLA</text>
</svg>
