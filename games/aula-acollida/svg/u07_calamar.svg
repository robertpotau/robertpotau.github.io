<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#eef2ff" rx="12"/>
  <!-- Body (mantle) - elongated diamond shape -->
  <ellipse cx="55" cy="45" rx="18" ry="30" fill="#e0e7ff" stroke="#818cf8" stroke-width="2"/>
  <!-- Side fins (aletes triangulars) -->
  <polygon points="55,20 40,32 55,38" fill="#c7d2fe" stroke="#818cf8" stroke-width="1.5"/>
  <polygon points="55,20 70,32 55,38" fill="#c7d2fe" stroke="#818cf8" stroke-width="1.5"/>
  <!-- Eye -->
  <circle cx="53" cy="42" r="4" fill="white" stroke="#818cf8" stroke-width="1.5"/>
  <circle cx="53" cy="42" r="2" fill="#1e1b4b"/>
  <!-- Head -->
  <ellipse cx="53" cy="62" rx="12" ry="8" fill="#c7d2fe" stroke="#818cf8" stroke-width="1.5"/>
  <!-- Tentacles (8) -->
  <line x1="42" y1="68" x2="36" y2="82" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
  <line x1="45" y1="70" x2="40" y2="85" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
  <line x1="49" y1="71" x2="46" y2="86" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
  <line x1="53" y1="71" x2="52" y2="87" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
  <line x1="57" y1="71" x2="58" y2="87" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
  <line x1="61" y1="70" x2="65" y2="86" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="68" x2="69" y2="83" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
  <!-- Stripes on body -->
  <line x1="46" y1="40" x2="64" y2="40" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="48" x2="66" y2="48" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Label -->
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">CALAMAR</text>
</svg>
