<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Body (puffer jacket with horizontal quilting lines) -->
  <path d="M28 38 Q22 38 18 44 L14 70 Q13 76 18 78 L82 78 Q87 76 86 70 L82 44 Q78 38 72 38 Z" fill="#2563eb" stroke="#1d4ed8" stroke-width="2"/>
  <!-- Quilting lines -->
  <line x1="14" y1="52" x2="86" y2="52" stroke="#1d4ed8" stroke-width="2"/>
  <line x1="14" y1="64" x2="86" y2="64" stroke="#1d4ed8" stroke-width="2"/>
  <!-- Left sleeve -->
  <path d="M28 38 Q18 36 12 42 L8 60 Q7 66 14 66 L18 44 Z" fill="#2563eb" stroke="#1d4ed8" stroke-width="2"/>
  <line x1="8" y1="50" x2="28" y2="46" stroke="#1d4ed8" stroke-width="1.5"/>
  <line x1="8" y1="58" x2="18" y2="56" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Right sleeve -->
  <path d="M72 38 Q82 36 88 42 L92 60 Q93 66 86 66 L82 44 Z" fill="#2563eb" stroke="#1d4ed8" stroke-width="2"/>
  <line x1="92" y1="50" x2="72" y2="46" stroke="#1d4ed8" stroke-width="1.5"/>
  <line x1="92" y1="58" x2="82" y2="56" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Hood -->
  <path d="M34 38 Q34 20 50 16 Q66 20 66 38 Z" fill="#2563eb" stroke="#1d4ed8" stroke-width="2"/>
  <path d="M38 38 Q38 24 50 20 Q62 24 62 38 Z" fill="#3b82f6"/>
  <!-- Zip -->
  <line x1="50" y1="38" x2="50" y2="78" stroke="#93c5fd" stroke-width="2.5"/>
  <!-- Zip handle -->
  <rect x="46" y="54" width="8" height="5" rx="2" fill="#93c5fd" stroke="#1d4ed8" stroke-width="1"/>
</svg>
