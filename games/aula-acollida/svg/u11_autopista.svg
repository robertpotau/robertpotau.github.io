<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Vores verdes (gespa) -->
  <rect x="0" y="0" width="100" height="100" fill="#4ade80"/>
  <!-- Asfalt (2 carrils) -->
  <rect x="18" y="0" width="64" height="100" fill="#374151"/>
  <!-- Línia exterior esquerra -->
  <rect x="18" y="0" width="3" height="100" fill="#f5f5f5"/>
  <!-- Línia exterior dreta -->
  <rect x="79" y="0" width="3" height="100" fill="#f5f5f5"/>
  <!-- Línia central discontinua (separació carrils) -->
  <rect x="49" y="2" width="2" height="14" rx="1" fill="#f5f5f5"/>
  <rect x="49" y="22" width="2" height="14" rx="1" fill="#f5f5f5"/>
  <rect x="49" y="42" width="2" height="14" rx="1" fill="#f5f5f5"/>
  <rect x="49" y="62" width="2" height="14" rx="1" fill="#f5f5f5"/>
  <rect x="49" y="82" width="2" height="14" rx="1" fill="#f5f5f5"/>
  <!-- Senyal lateral esquerre (senyal de velocitat) -->
  <rect x="4" y="22" width="12" height="12" rx="2" fill="#f5f5f5" stroke="#374151" stroke-width="1"/>
  <circle cx="10" cy="28" r="4.5" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="10" y="31" font-family="Arial,sans-serif" font-size="5" fill="#1f2937" font-weight="700" text-anchor="middle">80</text>
  <!-- Pal senyal esquerre -->
  <rect x="9" y="30" width="2" height="10" fill="#94a3b8"/>
  <!-- Senyal lateral dret (senyal de sortida) -->
  <rect x="84" y="44" width="14" height="10" rx="2" fill="#22c55e" stroke="#16a34a" stroke-width="1"/>
  <text x="91" y="51" font-family="Arial,sans-serif" font-size="4.5" fill="#f5f5f5" font-weight="700" text-anchor="middle">EXIT</text>
  <!-- Pal senyal dret -->
  <rect x="90" y="52" width="2" height="10" fill="#94a3b8"/>
  <!-- Pont/túnel esquemàtic al mig -->
  <rect x="0" y="46" width="18" height="8" fill="#6b7280"/>
  <rect x="82" y="46" width="18" height="8" fill="#6b7280"/>
  <rect x="18" y="46" width="64" height="8" fill="#4b5563"/>
  <!-- Ombra sota pont -->
  <rect x="18" y="50" width="64" height="4" fill="#374151" opacity="0.5"/>
  <!-- Cotxe petit al carril esquerre (il·lustratiu) -->
  <rect x="24" y="66" width="16" height="10" rx="2" fill="#ef4444"/>
  <rect x="26" y="63" width="12" height="5" rx="1.5" fill="#ef4444"/>
  <rect x="27" y="64" width="10" height="3" rx="1" fill="#bae6fd"/>
  <circle cx="27" cy="76" r="2.5" fill="#1f2937"/>
  <circle cx="37" cy="76" r="2.5" fill="#1f2937"/>
  <!-- Cotxe petit al carril dret -->
  <rect x="60" y="30" width="16" height="10" rx="2" fill="#3b82f6"/>
  <rect x="62" y="27" width="12" height="5" rx="1.5" fill="#3b82f6"/>
  <rect x="63" y="28" width="10" height="3" rx="1" fill="#bae6fd"/>
  <circle cx="63" cy="40" r="2.5" fill="#1f2937"/>
  <circle cx="73" cy="40" r="2.5" fill="#1f2937"/>
  <!-- Label -->
</svg>
