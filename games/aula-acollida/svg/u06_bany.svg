<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Bathtub -->
  <path d="M8 52 Q8 78 18 84 Q28 90 50 90 Q72 90 82 84 Q92 78 92 52 Z" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2.5"/>
  <!-- Tub rim -->
  <rect x="6" y="48" width="88" height="10" rx="5" fill="#f1f5f9" stroke="#9ca3af" stroke-width="2"/>
  <!-- Feet -->
  <ellipse cx="22" cy="90" rx="6" ry="4" fill="#9ca3af" stroke="#6b7280" stroke-width="1.5"/>
  <ellipse cx="78" cy="90" rx="6" ry="4" fill="#9ca3af" stroke="#6b7280" stroke-width="1.5"/>
  <!-- Water in tub -->
  <path d="M12 62 Q30 56 50 60 Q70 64 88 58" fill="none" stroke="#7dd3fc" stroke-width="2.5"/>
  <!-- Faucet -->
  <rect x="40" y="36" width="20" height="8" rx="4" fill="#9ca3af" stroke="#6b7280" stroke-width="2"/>
  <rect x="32" y="32" width="14" height="6" rx="3" fill="#6b7280" stroke="#4b5563" stroke-width="1.5"/>
  <rect x="54" y="32" width="14" height="6" rx="3" fill="#6b7280" stroke="#4b5563" stroke-width="1.5"/>
  <!-- Spout -->
  <path d="M50 44 Q50 50 46 52" stroke="#9ca3af" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Bubbles -->
  <circle cx="34" cy="66" r="4" fill="white" stroke="#7dd3fc" stroke-width="1.5" opacity="0.8"/>
  <circle cx="50" cy="58" r="5" fill="white" stroke="#7dd3fc" stroke-width="1.5" opacity="0.8"/>
  <circle cx="66" cy="64" r="3" fill="white" stroke="#7dd3fc" stroke-width="1.5" opacity="0.8"/>
</svg>
