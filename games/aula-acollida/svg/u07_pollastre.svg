<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#fffbeb" rx="12"/>
  <!-- Bone (os) -->
  <rect x="55" y="18" width="10" height="50" rx="5" fill="#f5f5f5" stroke="#d4d4d4" stroke-width="1.5"/>
  <!-- Bone knob top -->
  <circle cx="60" cy="18" r="8" fill="#f5f5f5" stroke="#d4d4d4" stroke-width="1.5"/>
  <!-- Meat (carn) - drumstick shape -->
  <ellipse cx="50" cy="62" rx="26" ry="22" fill="#d97706" stroke="#b45309" stroke-width="2.5"/>
  <!-- Roasted highlight -->
  <ellipse cx="44" cy="56" rx="14" ry="10" fill="#f59e0b" opacity="0.6"/>
  <!-- Dark roasted spots -->
  <ellipse cx="38" cy="65" rx="5" ry="3" fill="#92400e" opacity="0.5" transform="rotate(-20 38 65)"/>
  <ellipse cx="58" cy="70" rx="4" ry="2.5" fill="#92400e" opacity="0.5" transform="rotate(10 58 70)"/>
  <!-- Bone bottom knob -->
  <circle cx="60" cy="68" r="7" fill="#f5f5f5" stroke="#d4d4d4" stroke-width="1.5"/>
  <!-- Sheen -->
  <ellipse cx="40" cy="52" rx="6" ry="3" fill="#fde68a" opacity="0.7" transform="rotate(-15 40 52)"/>
  <!-- Label -->
</svg>
