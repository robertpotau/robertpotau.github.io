<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left hand -->
  <path d="M18 50 Q14 38 20 30 Q24 24 30 26 L30 55 Q26 58 22 56 Z" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <!-- Left fingers -->
  <rect x="26" y="18" width="8" height="18" rx="4" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <rect x="34" y="16" width="8" height="20" rx="4" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <rect x="42" y="18" width="8" height="18" rx="4" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <!-- Right hand -->
  <path d="M82 50 Q86 38 80 30 Q76 24 70 26 L70 55 Q74 58 78 56 Z" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <!-- Right fingers -->
  <rect x="66" y="18" width="8" height="18" rx="4" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <rect x="58" y="16" width="8" height="20" rx="4" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <rect x="50" y="18" width="8" height="18" rx="4" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <!-- Palms meeting in middle -->
  <ellipse cx="50" cy="55" rx="32" ry="12" fill="#ffd68a" stroke="#d97706" stroke-width="2"/>
  <!-- Impact lines -->
  <line x1="50" y1="40" x2="50" y2="34" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="42" x2="36" y2="38" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="42" x2="64" y2="38" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sound waves -->
  <path d="M50 68 Q38 72 40 80" stroke="#6b7280" stroke-width="1.5" fill="none"/>
  <path d="M50 68 Q62 72 60 80" stroke="#6b7280" stroke-width="1.5" fill="none"/>
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">APLAUDIR</text>
</svg>
