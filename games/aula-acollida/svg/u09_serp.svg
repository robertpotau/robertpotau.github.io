<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cos de la serp en forma de S - base verda -->
  <path d="M20,80 Q50,80 50,65 Q50,50 30,50 Q15,50 15,38 Q15,25 45,22 Q60,20 65,15"
        fill="none" stroke="#4ade80" stroke-width="13" stroke-linecap="round"/>
  <!-- Escates simulades (dasharray fosc per sobre) -->
  <path d="M20,80 Q50,80 50,65 Q50,50 30,50 Q15,50 15,38 Q15,25 45,22 Q60,20 65,15"
        fill="none" stroke="#16a34a" stroke-width="12" stroke-linecap="round" stroke-dasharray="3,5" opacity="0.55"/>
  <!-- Capa verda principal per sobre -->
  <path d="M20,80 Q50,80 50,65 Q50,50 30,50 Q15,50 15,38 Q15,25 45,22 Q60,20 65,15"
        fill="none" stroke="#4ade80" stroke-width="10" stroke-linecap="round"/>
  <!-- Cap triangular -->
  <polygon points="62,10 73,16 62,22" fill="#16a34a"/>
  <polygon points="62,10 51,14 62,22" fill="#16a34a"/>
  <!-- Llengua bifurcada -->
  <line x1="73" y1="16" x2="82" y2="12" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="73" y1="16" x2="82" y2="20" stroke="#ef4444" stroke-width="1.5"/>
  <!-- Ulls grocs -->
  <circle cx="64" cy="14" r="2.8" fill="#facc15"/>
  <circle cx="64" cy="14" r="1.3" fill="#1e1b4b"/>
  <circle cx="64.7" cy="13.3" r="0.4" fill="white"/>
  <!-- Label -->
</svg>
