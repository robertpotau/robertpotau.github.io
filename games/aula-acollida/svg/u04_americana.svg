  <path d="M36 42 L40 39 L44 42" fill="#94a3b8" stroke="#94a3b8" stroke-width="0.5"/>
  <!-- Right pocket -->
  <rect x="64" y="55" width="14" height="10" rx="1" fill="none" stroke="#4b5563" stroke-width="1.2"/>
  <!-- Sleeve cuff lines -->
  <line x1="7" y1="58" x2="18" y2="62" stroke="#374151" stroke-width="1.5"/>
  <line x1="82" y1="62" x2="93" y2="58" stroke="#374151" stroke-width="1.5"/>

