<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#f0f9ff" rx="12"/>
  <!-- Bottle body -->
  <rect x="32" y="42" width="36" height="42" rx="8" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2"/>
  <!-- Syrup level (red liquid) -->
  <rect x="33" y="55" width="34" height="28" rx="6" fill="#ef4444" opacity="0.85"/>
  <!-- Liquid surface line (slight curve) -->
  <path d="M33 55 Q50 52 66 55" fill="#fca5a5" opacity="0.6"/>
  <!-- Bottle neck -->
  <rect x="40" y="30" width="20" height="14" rx="4" fill="#bae6fd" stroke="#7dd3fc" stroke-width="2"/>
  <!-- Cap/top -->
  <rect x="37" y="22" width="26" height="12" rx="5" fill="#0ea5e9" stroke="#0284c7" stroke-width="2"/>
  <!-- Label (etiqueta) -->
  <rect x="34" y="57" width="32" height="20" rx="4" fill="#f5f5f5" stroke="#d4d4d4" stroke-width="1.5"/>
  <!-- Cross symbol on label -->
  <rect x="46" y="61" width="8" height="2.5" rx="1" fill="#ef4444"/>
  <rect x="49" y="58.5" width="2.5" height="8" rx="1" fill="#ef4444"/>
  <!-- Label text lines -->
  <rect x="37" y="70" width="26" height="2" rx="1" fill="#d4d4d4"/>
  <rect x="39" y="74" width="22" height="2" rx="1" fill="#d4d4d4"/>
  <!-- Glass reflection -->
  <line x1="38" y1="46" x2="38" y2="80" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Label -->
</svg>
