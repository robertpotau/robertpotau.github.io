<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cos del iogurt - pot cilíndric -->
  <path d="M 28,32 L 24,80 Q 24,84 50,84 Q 76,84 76,80 L 72,32 Z" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- Tapa d'alumini -->
  <ellipse cx="50" cy="32" rx="22" ry="5" fill="#b0bec5" stroke="#90a4ae" stroke-width="1.5"/>
  <!-- Pestanya de la tapa -->
  <path d="M 60,32 Q 68,28 72,32" stroke="#78909c" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Etiqueta del iogurt -->
  <path d="M 30,44 L 28,74 Q 28,78 50,78 Q 72,78 72,74 L 70,44 Z" fill="#f48fb1"/>
  <!-- Text IOGURT estilitzat -->
  <text x="50" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="white">IOGURT</text>
  <!-- Decoració de maduixa a l'etiqueta -->
  <circle cx="38" cy="68" r="5" fill="#e91e63"/>
  <path d="M 35,65 Q 38,62 41,65" fill="#4caf50" stroke="none"/>
  <circle cx="62" cy="68" r="5" fill="#e91e63"/>
  <path d="M 59,65 Q 62,62 65,65" fill="#4caf50" stroke="none"/>
  <!-- Fons arrodonit -->
  <ellipse cx="50" cy="80" rx="26" ry="4" fill="#f8bbd0" stroke="#f48fb1" stroke-width="1"/>
</svg>
