<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cel -->
  <rect x="0" y="0" width="100" height="55" fill="#e0f2fe"/>
  <!-- Sol -->
  <circle cx="85" cy="13" r="8" fill="#fde68a"/>
  <!-- Herba verda -->
  <rect x="0" y="55" width="100" height="37" fill="#4ade80"/>
  <!-- === Casa === -->
  <!-- Cos de la casa (quadrat vermell) -->
  <rect x="28" y="42" width="36" height="28" fill="#ef4444"/>
  <!-- Finestra esquerra -->
  <rect x="33" y="47" width="9" height="9" fill="#bae6fd" stroke="#b91c1c" stroke-width="1"/>
  <line x1="37.5" y1="47" x2="37.5" y2="56" stroke="#b91c1c" stroke-width="0.8"/>
  <line x1="33" y1="51.5" x2="42" y2="51.5" stroke="#b91c1c" stroke-width="0.8"/>
  <!-- Porta -->
  <rect x="48" y="55" width="10" height="15" fill="#92400e" rx="1"/>
  <!-- Pom porta -->
  <circle cx="56" cy="63" r="1" fill="#fde68a"/>
  <!-- Teulada triangular -->
  <polygon points="24,42 76,42 50,22" fill="#b91c1c"/>
  <!-- Xemeneia -->
  <rect x="58" y="24" width="6" height="12" fill="#b91c1c"/>
  <rect x="56" y="23" width="10" height="3" fill="#991b1b"/>
  <!-- === Tancat de fusta === -->
  <!-- Post horitzontal superior -->
  <line x1="6" y1="62" x2="28" y2="62" stroke="#92400e" stroke-width="2.5"/>
  <line x1="6" y1="67" x2="28" y2="67" stroke="#92400e" stroke-width="2.5"/>
  <!-- Pals verticals -->
  <line x1="10" y1="58" x2="10" y2="72" stroke="#92400e" stroke-width="2"/>
  <line x1="18" y1="58" x2="18" y2="72" stroke="#92400e" stroke-width="2"/>
  <line x1="26" y1="58" x2="26" y2="72" stroke="#92400e" stroke-width="2"/>
  <!-- Tancat dreta -->
  <line x1="64" y1="62" x2="94" y2="62" stroke="#92400e" stroke-width="2.5"/>
  <line x1="64" y1="67" x2="94" y2="67" stroke="#92400e" stroke-width="2.5"/>
  <line x1="66" y1="58" x2="66" y2="72" stroke="#92400e" stroke-width="2"/>
  <line x1="74" y1="58" x2="74" y2="72" stroke="#92400e" stroke-width="2"/>
  <line x1="82" y1="58" x2="82" y2="72" stroke="#92400e" stroke-width="2"/>
  <line x1="90" y1="58" x2="90" y2="72" stroke="#92400e" stroke-width="2"/>
  <!-- Label -->
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">GRANJA</text>
</svg>
