  <rect x="44" y="46" width="7" height="6" rx="1.5" fill="#bae6fd" stroke="#38bdf8" stroke-width="0.8"/>
  <rect x="55" y="46" width="7" height="6" rx="1.5" fill="#bae6fd" stroke="#38bdf8" stroke-width="0.8"/>
  <!-- Pont de govern superior -->
  <rect x="34" y="34" width="32" height="10" rx="2" fill="#e2e8f0" stroke="#d1d5db" stroke-width="1"/>
  <rect x="38" y="36" width="10" height="6" rx="1" fill="#bae6fd" stroke="#38bdf8" stroke-width="0.8"/>
