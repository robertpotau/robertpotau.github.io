<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background box (farther, smaller) -->
  <rect x="30" y="28" width="32" height="28" rx="3" fill="#d1d5db" stroke="#9ca3af" stroke-width="1.5"/>
  <!-- Front box (bigger, in front) -->
  <rect x="18" y="45" width="42" height="30" rx="4" fill="#60a5fa" stroke="#2563eb" stroke-width="2.5"/>
  <!-- Arrow pointing to front box -->
  <polygon points="80,50 72,45 72,55" fill="#374151"/>
  <line x1="65" y1="50" x2="72" y2="50" stroke="#374151" stroke-width="2"/>
</svg>
