<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Whole orange -->
  <circle cx="36" cy="50" r="28" fill="#f97316"/>
  <!-- Orange texture (dimples) -->
  <circle cx="36" cy="50" r="28" fill="none" stroke="#ea580c" stroke-width="0.5" opacity="0.4"/>
  <!-- Stem + leaf -->
  <rect x="35" y="20" width="2.5" height="6" rx="1" fill="#92400e"/>
  <ellipse cx="42" cy="22" rx="7" ry="3.5" fill="#15803d" transform="rotate(-20,42,22)"/>
  <line x1="37" y1="22" x2="46" y2="19" stroke="#166534" stroke-width="0.8"/>
  <!-- Highlight -->
  <circle cx="26" cy="38" r="7" fill="#fb923c" opacity="0.5"/>
  <!-- Slice (half circle on right side) -->
  <path d="M62 35 A18 18 0 0 1 62 65 L62 50Z" fill="#fbbf24"/>
  <path d="M62 35 A18 18 0 0 1 62 65" fill="none" stroke="#f97316" stroke-width="2"/>
  <!-- Slice segments -->
  <line x1="62" y1="35" x2="62" y2="65" stroke="#f97316" stroke-width="1.5"/>
  <line x1="62" y1="50" x2="78" y2="42" stroke="#f97316" stroke-width="1"/>
  <line x1="62" y1="50" x2="78" y2="58" stroke="#f97316" stroke-width="1"/>
  <line x1="62" y1="50" x2="80" y2="50" stroke="#f97316" stroke-width="1"/>
  <!-- Seeds in slice -->
  <ellipse cx="73" cy="47" rx="1.5" ry="2" fill="white"/>
  <ellipse cx="73" cy="53" rx="1.5" ry="2" fill="white"/>
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">TARONJA</text>
</svg>
