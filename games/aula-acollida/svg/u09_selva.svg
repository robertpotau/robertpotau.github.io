<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cel tropical -->
  <rect x="0" y="0" width="100" height="55" fill="#d1fae5"/>
  <!-- Sol -->
  <circle cx="85" cy="13" r="9" fill="#fbbf24"/>
  <!-- Terra verd intens -->
  <rect x="0" y="55" width="100" height="37" fill="#16a34a"/>
  <rect x="0" y="55" width="100" height="7" fill="#15803d"/>
  <!-- === Palmera esquerra === -->
  <path d="M18,75 Q16,60 20,40 Q21,28 22,18" fill="none" stroke="#92400e" stroke-width="4" stroke-linecap="round"/>
  <!-- 5 fulles allargades en arc -->
  <ellipse cx="22" cy="18" rx="15" ry="4" fill="#16a34a" transform="rotate(-40,22,18)"/>
  <ellipse cx="22" cy="18" rx="15" ry="4" fill="#15803d" transform="rotate(-15,22,18)"/>
  <ellipse cx="22" cy="18" rx="15" ry="4" fill="#16a34a" transform="rotate(15,22,18)"/>
  <ellipse cx="22" cy="18" rx="14" ry="3.5" fill="#15803d" transform="rotate(45,22,18)"/>
  <ellipse cx="22" cy="18" rx="13" ry="3" fill="#16a34a" transform="rotate(-65,22,18)"/>
  <!-- Cocos -->
  <circle cx="26" cy="22" r="2.8" fill="#92400e"/>
  <circle cx="21" cy="24" r="2.5" fill="#78350f"/>
  <!-- === Palmera central gran === -->
  <path d="M50,80 Q47,62 52,42 Q53,28 54,16" fill="none" stroke="#92400e" stroke-width="5" stroke-linecap="round"/>
  <!-- 5 fulles -->
  <ellipse cx="54" cy="16" rx="19" ry="5" fill="#16a34a" transform="rotate(-35,54,16)"/>
  <ellipse cx="54" cy="16" rx="19" ry="5" fill="#15803d" transform="rotate(-10,54,16)"/>
  <ellipse cx="54" cy="16" rx="18" ry="5" fill="#16a34a" transform="rotate(20,54,16)"/>
  <ellipse cx="54" cy="16" rx="17" ry="4.5" fill="#15803d" transform="rotate(55,54,16)"/>
  <ellipse cx="54" cy="16" rx="15" ry="4" fill="#16a34a" transform="rotate(-65,54,16)"/>
  <!-- Coco central -->
  <circle cx="58" cy="20" r="3.5" fill="#92400e"/>
  <!-- === Palmera dreta === -->
  <path d="M80,77 Q79,62 82,44 Q83,32 82,20" fill="none" stroke="#92400e" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="82" cy="20" rx="15" ry="4" fill="#15803d" transform="rotate(-30,82,20)"/>
  <ellipse cx="82" cy="20" rx="15" ry="4" fill="#16a34a" transform="rotate(5,82,20)"/>
  <ellipse cx="82" cy="20" rx="14" ry="4" fill="#15803d" transform="rotate(40,82,20)"/>
  <ellipse cx="82" cy="20" rx="13" ry="3.5" fill="#16a34a" transform="rotate(-60,82,20)"/>
  <ellipse cx="82" cy="20" rx="12" ry="3" fill="#15803d" transform="rotate(65,82,20)"/>
  <!-- Flors tropicals al terra -->
  <circle cx="36" cy="60" r="3" fill="#f9a8d4"/>
  <circle cx="36" cy="60" r="1.5" fill="#fbbf24"/>
  <circle cx="64" cy="62" r="2.8" fill="#fb923c"/>
  <circle cx="64" cy="62" r="1.3" fill="#fbbf24"/>
  <!-- Label -->
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">SELVA</text>
</svg>
