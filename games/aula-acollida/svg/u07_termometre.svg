<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#f0f9ff" rx="12"/>
  <!-- Thermometer body - thin glass tube (slightly diagonal) -->
  <rect x="44" y="18" width="14" height="55" rx="7" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2" transform="rotate(15 50 50)"/>
  <!-- Mercury column (red) -->
  <rect x="47" y="40" width="8" height="30" rx="3" fill="#ef4444" transform="rotate(15 50 50)"/>
  <!-- Bulb at bottom -->
  <circle cx="62" cy="76" r="10" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
  <!-- Bulb shine -->
  <circle cx="59" cy="73" r="3" fill="#fca5a5" opacity="0.7"/>
  <!-- Scale marks on tube -->
  <line x1="51" y1="28" x2="57" y2="28" stroke="#64748b" stroke-width="1.5" transform="rotate(15 50 50)"/>
  <line x1="52" y1="34" x2="56" y2="34" stroke="#64748b" stroke-width="1" transform="rotate(15 50 50)"/>
  <line x1="51" y1="40" x2="57" y2="40" stroke="#64748b" stroke-width="1.5" transform="rotate(15 50 50)"/>
  <line x1="52" y1="46" x2="56" y2="46" stroke="#64748b" stroke-width="1" transform="rotate(15 50 50)"/>
  <line x1="51" y1="52" x2="57" y2="52" stroke="#64748b" stroke-width="1.5" transform="rotate(15 50 50)"/>
  <!-- Temperature numbers -->
  <text x="30" y="38" font-family="Arial,sans-serif" font-size="7" fill="#64748b" font-weight="700" transform="rotate(15 50 50)">40°</text>
  <text x="30" y="50" font-family="Arial,sans-serif" font-size="7" fill="#64748b" font-weight="700" transform="rotate(15 50 50)">37°</text>
  <!-- Glass reflection on tube -->
  <line x1="46" y1="20" x2="46" y2="60" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6" transform="rotate(15 50 50)"/>
  <!-- Label -->
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">TERMÒMETRE</text>
</svg>
