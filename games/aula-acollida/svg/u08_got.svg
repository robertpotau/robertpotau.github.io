<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Got d'aigua transparent -->
  <!-- Cos del got (forma troncocònica) -->
  <path d="M 28,20 L 22,82 L 78,82 L 72,20 Z" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <!-- Fons arrodonit -->
  <ellipse cx="50" cy="82" rx="28" ry="4" fill="#bbdefb" stroke="#90caf9" stroke-width="2"/>
  <!-- Aigu a dins -->
  <path d="M 30,50 L 24,82 L 76,82 L 70,50 Z" fill="#29b6f6" opacity="0.55"/>
  <!-- Línia de la superfície de l'aigua -->
  <path d="M 30,50 Q 50,44 70,50" fill="none" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <!-- Reflex esquerre -->
  <path d="M 33,26 L 30,55" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Vora superior -->
  <ellipse cx="50" cy="20" rx="22" ry="3" fill="none" stroke="#90caf9" stroke-width="2"/>
  <!-- Reflexos bolletes -->
  <circle cx="62" cy="62" r="3" fill="white" opacity="0.4"/>
  <circle cx="58" cy="72" r="2" fill="white" opacity="0.3"/>
</svg>
