  <path d="M50 54 Q55 47 62 48" stroke="#a16207" stroke-width="0.8" fill="none"/>
  <!-- Oranges -->
  <circle cx="72" cy="50" r="5.5" fill="#f97316"/>
  <path d="M72 44.5 Q73.5 42 75 43.5" stroke="#15803d" stroke-width="1.5" fill="none"/>
  <circle cx="83" cy="50" r="5.5" fill="#f97316"/>
