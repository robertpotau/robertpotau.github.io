<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#fffbeb" rx="12"/>
  <!-- Cookie base circle -->
  <circle cx="50" cy="50" r="36" fill="#d97706" stroke="#b45309" stroke-width="2.5"/>
  <!-- Cookie lighter center -->
  <circle cx="50" cy="50" r="30" fill="#f59e0b" opacity="0.4"/>
  <!-- Chocolate chips -->
  <ellipse cx="38" cy="38" rx="5" ry="4" fill="#1f2937" transform="rotate(-15 38 38)"/>
  <ellipse cx="58" cy="36" rx="5" ry="4" fill="#1f2937" transform="rotate(20 58 36)"/>
  <ellipse cx="32" cy="55" rx="5" ry="4" fill="#1f2937" transform="rotate(-10 32 55)"/>
  <ellipse cx="55" cy="55" rx="5" ry="4" fill="#1f2937" transform="rotate(10 55 55)"/>
  <ellipse cx="44" cy="65" rx="5" ry="4" fill="#1f2937" transform="rotate(-25 44 65)"/>
  <ellipse cx="65" cy="52" rx="4.5" ry="3.5" fill="#1f2937" transform="rotate(15 65 52)"/>
  <ellipse cx="48" cy="42" rx="4" ry="3" fill="#374151" transform="rotate(5 48 42)"/>
  <!-- Edge texture (slightly bumpy) -->
  <circle cx="50" cy="14" r="3" fill="#b45309" opacity="0.5"/>
  <circle cx="70" cy="22" r="3" fill="#b45309" opacity="0.5"/>
  <circle cx="82" cy="42" r="3" fill="#b45309" opacity="0.5"/>
  <circle cx="78" cy="64" r="3" fill="#b45309" opacity="0.5"/>
  <circle cx="60" cy="80" r="3" fill="#b45309" opacity="0.5"/>
  <circle cx="38" cy="82" r="3" fill="#b45309" opacity="0.5"/>
  <circle cx="20" cy="66" r="3" fill="#b45309" opacity="0.5"/>
  <circle cx="17" cy="44" r="3" fill="#b45309" opacity="0.5"/>
  <circle cx="28" cy="24" r="3" fill="#b45309" opacity="0.5"/>
  <!-- Label -->
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">GALETA</text>
</svg>
