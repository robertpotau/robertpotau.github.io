<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Edifici estació -->
  <rect x="5" y="20" width="90" height="52" rx="3" fill="#94a3b8"/>
  <!-- Sostre -->
  <rect x="3" y="16" width="94" height="8" rx="3" fill="#64748b"/>
  <!-- Arcades façana -->
  <rect x="10" y="45" width="18" height="27" rx="2" fill="#e2e8f0"/>
  <ellipse cx="19" cy="45" rx="9" ry="6" fill="#e2e8f0"/>
  <rect x="41" y="45" width="18" height="27" rx="2" fill="#e2e8f0"/>
  <ellipse cx="50" cy="45" rx="9" ry="6" fill="#e2e8f0"/>
  <rect x="72" y="45" width="18" height="27" rx="2" fill="#e2e8f0"/>
  <ellipse cx="81" cy="45" rx="9" ry="6" fill="#e2e8f0"/>
  <!-- Rellotge central -->
  <circle cx="50" cy="33" r="13" fill="#f5f5f5"/>
  <circle cx="50" cy="33" r="11" fill="white"/>
  <!-- Marques rellotge -->
  <line x1="50" y1="23" x2="50" y2="26" stroke="#1f2937" stroke-width="2"/>
  <line x1="50" y1="40" x2="50" y2="43" stroke="#1f2937" stroke-width="2"/>
  <line x1="40" y1="33" x2="43" y2="33" stroke="#1f2937" stroke-width="2"/>
  <line x1="57" y1="33" x2="60" y2="33" stroke="#1f2937" stroke-width="2"/>
  <!-- Agulles rellotge -->
  <line x1="50" y1="33" x2="50" y2="25" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="33" x2="57" y2="36" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Vies de tren -->
  <rect x="0" y="72" width="100" height="5" fill="#6b7280"/>
  <line x1="0" y1="74" x2="100" y2="74" stroke="#4b5563" stroke-width="1" stroke-dasharray="8,4"/>
  <!-- Tren petit -->
  <rect x="5" y="62" width="40" height="12" rx="3" fill="#1f2937"/>
  <rect x="38" y="62" width="10" height="12" rx="2" fill="#374151"/>
  <rect x="8" y="64" width="10" height="7" rx="1" fill="#bae6fd"/>
  <rect x="22" y="64" width="10" height="7" rx="1" fill="#bae6fd"/>
  <!-- Rodes tren -->
  <circle cx="14" cy="74" r="4" fill="#111827"/>
  <circle cx="36" cy="74" r="4" fill="#111827"/>
  <!-- Label -->
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">ESTACIÓ</text>
</svg>
