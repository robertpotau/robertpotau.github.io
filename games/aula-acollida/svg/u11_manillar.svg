<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Handlebar stem -->
  <rect x="45" y="50" width="10" height="32" rx="5" fill="#374151" stroke="#1f2937" stroke-width="2"/>
  <!-- Horizontal bar -->
  <rect x="12" y="44" width="76" height="12" rx="6" fill="#4b5563" stroke="#1f2937" stroke-width="2"/>
  <!-- Left grip -->
  <rect x="8" y="44" width="20" height="12" rx="6" fill="#1f2937" stroke="#111" stroke-width="2"/>
  <!-- Left grip texture lines -->
  <line x1="14" y1="46" x2="14" y2="54" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="46" x2="18" y2="54" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="46" x2="22" y2="54" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <!-- Right grip -->
  <rect x="72" y="44" width="20" height="12" rx="6" fill="#1f2937" stroke="#111" stroke-width="2"/>
  <line x1="78" y1="46" x2="78" y2="54" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="82" y1="46" x2="82" y2="54" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="46" x2="86" y2="54" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <!-- Bell -->
  <circle cx="36" cy="38" r="8" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
  <circle cx="36" cy="38" r="4" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
  <!-- Brake lever right -->
  <path d="M72 50 Q68 42 66 38" fill="none" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
</svg>
