<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Body -->
  <rect x="32" y="54" width="24" height="24" rx="4" fill="#3b82f6"/>
  <!-- Head - smooth young face -->
  <circle cx="44" cy="40" r="18" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <!-- Young hair - neat -->
  <path d="M26 35 Q26 20 44 18 Q62 20 62 35" fill="#92400e"/>
  <!-- Big bright eyes (youthful) -->
  <ellipse cx="36" cy="40" rx="7" ry="7" fill="white" stroke="#374151" stroke-width="1.5"/>
  <ellipse cx="52" cy="40" rx="7" ry="7" fill="white" stroke="#374151" stroke-width="1.5"/>
  <circle cx="36" cy="40" r="4" fill="#374151"/>
  <circle cx="52" cy="40" r="4" fill="#374151"/>
  <circle cx="34" cy="38" r="1.5" fill="white"/>
  <circle cx="50" cy="38" r="1.5" fill="white"/>
  <!-- Big smile -->
  <path d="M32 50 Q44 58 56 50" stroke="#c2850a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <circle cx="28" cy="46" r="5" fill="#fca5a5" opacity="0.5"/>
  <circle cx="60" cy="46" r="5" fill="#fca5a5" opacity="0.5"/>
  <!-- Arms -->
  <line x1="32" y1="60" x2="20" y2="72" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <line x1="56" y1="60" x2="68" y2="72" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="32" y="78" width="9" height="8" rx="2" fill="#1e40af"/>
  <rect x="47" y="78" width="9" height="8" rx="2" fill="#1e40af"/>
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">JOVE</text>
</svg>
