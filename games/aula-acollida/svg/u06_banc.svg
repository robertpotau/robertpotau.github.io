<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Bench seat (3 planks) -->
  <rect x="8" y="38" width="84" height="10" rx="3" fill="#92400e" stroke="#78350f" stroke-width="2"/>
  <rect x="8" y="49" width="84" height="10" rx="3" fill="#a16207" stroke="#78350f" stroke-width="2"/>
  <rect x="8" y="60" width="84" height="10" rx="3" fill="#92400e" stroke="#78350f" stroke-width="2"/>
  <!-- Left back support -->
  <rect x="14" y="12" width="10" height="62" rx="3" fill="#6b4c2a" stroke="#78350f" stroke-width="2"/>
  <!-- Right back support -->
  <rect x="76" y="12" width="10" height="62" rx="3" fill="#6b4c2a" stroke="#78350f" stroke-width="2"/>
  <!-- Back rail top -->
  <rect x="12" y="12" width="76" height="10" rx="3" fill="#92400e" stroke="#78350f" stroke-width="2"/>
  <!-- Back rail middle -->
  <rect x="12" y="26" width="76" height="8" rx="3" fill="#a16207" stroke="#78350f" stroke-width="1.5"/>
  <!-- Legs -->
  <rect x="14" y="70" width="10" height="24" rx="3" fill="#6b4c2a" stroke="#78350f" stroke-width="2"/>
  <rect x="76" y="70" width="10" height="24" rx="3" fill="#6b4c2a" stroke="#78350f" stroke-width="2"/>
  <!-- Cross support -->
  <line x1="14" y1="88" x2="86" y2="88" stroke="#78350f" stroke-width="3" stroke-linecap="round"/>
</svg>
