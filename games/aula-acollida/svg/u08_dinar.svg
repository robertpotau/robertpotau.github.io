  <line x1="16" y1="38" x2="16" y2="80" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
  <line x1="12" y1="38" x2="12" y2="52" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="38" x2="16" y2="52" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="38" x2="20" y2="52" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>
