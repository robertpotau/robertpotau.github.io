  <line x1="85" y1="8" x2="82" y2="11" stroke="#d97706" stroke-width="2" stroke-linecap="round"/>
  <line x1="89" y1="18" x2="85" y2="18" stroke="#d97706" stroke-width="2" stroke-linecap="round"/>
  <line x1="85" y1="28" x2="82" y2="25" stroke="#d97706" stroke-width="2" stroke-linecap="round"/>
  <!-- Plate with food -->
  <ellipse cx="46" cy="68" rx="38" ry="8" fill="#d1d5db" stroke="#9ca3af" stroke-width="1.5"/>
