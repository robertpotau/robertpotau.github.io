<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gym floor -->
  <rect x="8" y="55" width="84" height="20" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <!-- Court lines -->
  <line x1="50" y1="55" x2="50" y2="75" stroke="#d97706" stroke-width="1.5"/>
  <ellipse cx="50" cy="65" rx="10" ry="8" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <!-- Backboard -->
  <rect x="40" y="20" width="20" height="14" rx="2" fill="white" stroke="#374151" stroke-width="2"/>
  <rect x="44" y="25" width="12" height="7" rx="1" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <!-- Hoop -->
  <line x1="50" y1="34" x2="50" y2="40" stroke="#9ca3af" stroke-width="2"/>
  <ellipse cx="50" cy="40" rx="7" ry="3" fill="none" stroke="#f97316" stroke-width="2.5"/>
  <!-- Net lines -->
  <line x1="43" y1="40" x2="45" y2="50" stroke="#9ca3af" stroke-width="1"/>
  <line x1="57" y1="40" x2="55" y2="50" stroke="#9ca3af" stroke-width="1"/>
  <line x1="50" y1="40" x2="50" y2="50" stroke="#9ca3af" stroke-width="1"/>
  <!-- Basketball -->
  <circle cx="22" cy="68" r="7" fill="#f97316" stroke="#ea580c" stroke-width="1.5"/>
  <path d="M16 65 Q22 70 28 65" stroke="#92400e" stroke-width="1" fill="none"/>
  <path d="M16 71 Q22 66 28 71" stroke="#92400e" stroke-width="1" fill="none"/>
  <line x1="22" y1="61" x2="22" y2="75" stroke="#92400e" stroke-width="1"/>
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">GIMNÀS</text>
</svg>
