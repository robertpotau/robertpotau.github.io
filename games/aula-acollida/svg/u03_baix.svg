<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Tall figure (left, for contrast) -->
  <circle cx="28" cy="16" r="7" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <rect x="22" y="23" width="12" height="28" rx="3" fill="#9ca3af"/>
  <rect x="22" y="51" width="5" height="14" rx="2" fill="#6b7280"/>
  <rect x="29" y="51" width="5" height="14" rx="2" fill="#6b7280"/>
  <!-- Short figure (right, highlighted) -->
  <circle cx="70" cy="44" r="9" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <rect x="63" y="53" width="14" height="18" rx="3" fill="#f97316"/>
  <rect x="63" y="71" width="5" height="10" rx="2" fill="#ea580c"/>
  <rect x="72" y="71" width="5" height="10" rx="2" fill="#ea580c"/>
  <!-- Height arrow for short -->
  <line x1="84" y1="35" x2="84" y2="65" stroke="#ef4444" stroke-width="2"/>
  <polygon points="84,33 80,41 88,41" fill="#ef4444"/>
  <polygon points="84,67 80,59 88,59" fill="#ef4444"/>
  <!-- Comparison line -->
  <line x1="10" y1="65" x2="90" y2="65" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- BAIX label -->
  <text x="70" y="87" font-family="Arial,sans-serif" font-size="7" fill="#f97316" font-weight="700" text-anchor="middle">BAIX</text>
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">BAIX</text>
</svg>
