<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#fef9f0" rx="12"/>
  <!-- Bandaid base (beix) - slight diagonal -->
  <rect x="12" y="40" width="76" height="22" rx="11" fill="#fde68a" stroke="#f59e0b" stroke-width="2" transform="rotate(-5 50 51)"/>
  <!-- Adhesive bands (ends) - slightly darker beix -->
  <rect x="12" y="40" width="24" height="22" rx="11" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5" transform="rotate(-5 50 51)"/>
  <rect x="64" y="40" width="24" height="22" rx="11" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5" transform="rotate(-5 50 51)"/>
  <!-- Cross-hatch texture on adhesive ends -->
  <line x1="16" y1="43" x2="30" y2="59" stroke="#f59e0b" stroke-width="1" opacity="0.5" transform="rotate(-5 50 51)"/>
  <line x1="20" y1="40" x2="34" y2="56" stroke="#f59e0b" stroke-width="1" opacity="0.5" transform="rotate(-5 50 51)"/>
  <line x1="66" y1="42" x2="80" y2="58" stroke="#f59e0b" stroke-width="1" opacity="0.5" transform="rotate(-5 50 51)"/>
  <line x1="70" y1="40" x2="84" y2="56" stroke="#f59e0b" stroke-width="1" opacity="0.5" transform="rotate(-5 50 51)"/>
  <!-- Central pad (coixinet blanc) -->
  <rect x="36" y="42" width="28" height="18" rx="4" fill="#f5f5f5" stroke="#d4d4d4" stroke-width="1.5" transform="rotate(-5 50 51)"/>
  <!-- Dots on pad (perforations) -->
  <circle cx="44" cy="50" r="1.5" fill="#d4d4d4" transform="rotate(-5 50 51)"/>
  <circle cx="50" cy="50" r="1.5" fill="#d4d4d4" transform="rotate(-5 50 51)"/>
  <circle cx="56" cy="50" r="1.5" fill="#d4d4d4" transform="rotate(-5 50 51)"/>
  <!-- Label -->
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">TIRETA</text>
</svg>
