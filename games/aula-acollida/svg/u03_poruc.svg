<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Scared face -->
  <circle cx="50" cy="45" r="28" fill="#ffd68a" stroke="#d97706" stroke-width="2"/>
  <!-- Wide open scared eyes -->
  <ellipse cx="34" cy="40" rx="9" ry="10" fill="white" stroke="#374151" stroke-width="2"/>
  <ellipse cx="66" cy="40" rx="9" ry="10" fill="white" stroke="#374151" stroke-width="2"/>
  <circle cx="34" cy="40" r="6" fill="#1a1a1a"/>
  <circle cx="66" cy="40" r="6" fill="#1a1a1a"/>
  <circle cx="31" cy="37" r="2.5" fill="white"/>
  <circle cx="63" cy="37" r="2.5" fill="white"/>
  <!-- Scared eyebrows (raised high) -->
  <path d="M24 28 Q34 22 44 28" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M56 28 Q66 22 76 28" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Open scared mouth (O shape) -->
  <ellipse cx="50" cy="60" rx="10" ry="8" fill="#1f2937"/>
  <ellipse cx="50" cy="57" rx="8" ry="4" fill="#f87171"/>
  <!-- Shaking lines -->
  <path d="M22 52 Q18 50 22 48 Q26 46 22 44" stroke="#9ca3af" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M78 52 Q82 50 78 48 Q74 46 78 44" stroke="#9ca3af" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Sweat drops -->
  <path d="M22 30 Q20 35 23 37" stroke="#93c5fd" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M78 30 Q80 35 77 37" stroke="#93c5fd" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Ghost nearby -->
  <path d="M76 12 Q76 6 82 6 Q88 6 88 12 L88 24 Q86 22 84 24 Q82 22 80 24 Q78 22 76 24 Z" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <circle cx="80" cy="14" r="2" fill="#374151"/>
  <circle cx="84" cy="14" r="2" fill="#374151"/>
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">PORUC</text>
</svg>
