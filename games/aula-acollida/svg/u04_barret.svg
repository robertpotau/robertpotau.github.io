<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Hat crown (cylinder) -->
  <rect x="28" y="18" width="44" height="45" rx="3" fill="#1f2937"/>
  <!-- Crown top -->
  <ellipse cx="50" cy="18" rx="22" ry="5" fill="#374151"/>
  <!-- Hat band -->
  <rect x="28" y="57" width="44" height="6" rx="0" fill="#4b5563"/>
  <!-- Hat brim -->
  <ellipse cx="50" cy="63" rx="32" ry="7" fill="#1f2937"/>
  <!-- Brim highlight (top edge) -->
  <ellipse cx="50" cy="63" rx="32" ry="7" fill="none" stroke="#374151" stroke-width="1.5"/>
  <!-- Brim underside shade -->
  <ellipse cx="50" cy="65" rx="30" ry="5" fill="#111827" opacity="0.4"/>
  <!-- Crown highlight -->
  <rect x="30" y="20" width="5" height="40" rx="2" fill="#374151" opacity="0.5"/>
  <!-- Band buckle/ribbon -->
  <rect x="46" y="58" width="8" height="4" rx="1" fill="#6b7280"/>

</svg>
