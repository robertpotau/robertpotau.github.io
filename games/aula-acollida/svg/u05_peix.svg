<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Water background (light blue) -->
  <ellipse cx="50" cy="55" rx="46" ry="32" fill="#e0f2fe" opacity="0.6"/>
  <!-- Caudal fin (V-shape tail) -->
  <path d="M75 45 L92 30 L92 70 Z" fill="#fbbf24" stroke="#d97706" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Body (oval, orange/golden) -->
  <ellipse cx="48" cy="50" rx="32" ry="20" fill="#f97316" stroke="#ea580c" stroke-width="2"/>
  <!-- Dorsal fin (top) -->
  <path d="M30 32 Q40 22 55 30" fill="#fbbf24" stroke="#d97706" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Pectoral fin (side) -->
  <path d="M38 55 Q30 65 38 68 Q42 60 42 55 Z" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <!-- Scales (arched lines) -->
  <path d="M20 44 Q28 38 36 44" fill="none" stroke="#ea580c" stroke-width="1.5"/>
  <path d="M30 36 Q38 30 46 36" fill="none" stroke="#ea580c" stroke-width="1.5"/>
  <path d="M35 50 Q43 44 51 50" fill="none" stroke="#ea580c" stroke-width="1.5"/>
  <path d="M20 55 Q28 49 36 55" fill="none" stroke="#ea580c" stroke-width="1.5"/>
  <path d="M45 42 Q53 36 61 42" fill="none" stroke="#ea580c" stroke-width="1.5"/>
  <path d="M50 54 Q58 48 66 54" fill="none" stroke="#ea580c" stroke-width="1.5"/>
  <!-- Eye (large, black with white shine) -->
  <circle cx="22" cy="47" r="7" fill="white" stroke="#ea580c" stroke-width="1.5"/>
  <circle cx="22" cy="47" r="4.5" fill="#1f2937"/>
  <circle cx="23.5" cy="45.5" r="2" fill="white"/>
  <!-- Mouth -->
  <path d="M10 50 Q14 47 14 52" fill="none" stroke="#ea580c" stroke-width="2" stroke-linecap="round"/>
  <!-- Bubble -->
  <circle cx="8" cy="40" r="3" fill="none" stroke="#93c5fd" stroke-width="1.5"/>
  <circle cx="14" cy="32" r="2" fill="none" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- Label -->
</svg>
