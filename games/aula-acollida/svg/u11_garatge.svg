<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Building walls -->
  <rect x="6" y="28" width="88" height="66" rx="2" fill="#f3f4f6" stroke="#374151" stroke-width="2.5"/>
  <!-- Roof -->
  <path d="M2 30 L50 6 L98 30 Z" fill="#374151" stroke="#1f2937" stroke-width="2"/>
  <!-- Garage door -->
  <rect x="16" y="42" width="68" height="50" rx="3" fill="#d1d5db" stroke="#6b7280" stroke-width="2"/>
  <!-- Door panels (3 horizontal strips) -->
  <rect x="16" y="42" width="68" height="16" rx="2" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <rect x="16" y="58" width="68" height="16" rx="0" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <rect x="16" y="74" width="68" height="18" rx="2" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <!-- Door handle / pull -->
  <rect x="43" y="78" width="14" height="4" rx="2" fill="#6b7280"/>
  <!-- Window above door -->
  <rect x="36" y="30" width="28" height="12" rx="2" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="50" y1="30" x2="50" y2="42" stroke="#3b82f6" stroke-width="1"/>
</svg>
