<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Door frame -->
  <rect x="18" y="20" width="38" height="58" rx="3" fill="#d1d5db" stroke="#6b7280" stroke-width="2.5"/>
  <!-- Door panel -->
  <rect x="22" y="24" width="30" height="50" rx="2" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <!-- Door handle -->
  <circle cx="46" cy="50" r="3" fill="#d97706"/>
  <!-- Arrow going OUT (to the right, exiting) -->
  <line x1="60" y1="50" x2="82" y2="50" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
  <polygon points="84,50 74,44 74,56" fill="#16a34a"/>
  <!-- Small figure walking out -->
  <circle cx="70" cy="30" r="6" fill="#fcd34d"/>
  <rect x="65" y="36" width="10" height="13" rx="2" fill="#3b82f6"/>
  <line x1="65" y1="40" x2="58" y2="48" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  <line x1="75" y1="40" x2="82" y2="46" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  <line x1="66" y1="49" x2="62" y2="60" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>
  <line x1="74" y1="49" x2="78" y2="60" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>
</svg>
