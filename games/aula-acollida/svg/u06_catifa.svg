  <!-- Vora decorativa -->
  <rect x="12" y="26" width="76" height="46" rx="3" fill="#92400e"/>
  <rect x="16" y="30" width="68" height="38" rx="2" fill="#d97706"/>
  <!-- Patró geomètric (rombs) -->
