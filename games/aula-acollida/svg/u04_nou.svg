<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- T-shirt body (new/bright) -->
  <path d="M28 30 L22 72 L78 72 L72 30 Z" fill="#3b82f6"/>
  <!-- Left sleeve -->
  <path d="M28 30 L16 24 L12 42 L24 46 Z" fill="#3b82f6"/>
  <!-- Right sleeve -->
  <path d="M72 30 L84 24 L88 42 L76 46 Z" fill="#3b82f6"/>
  <!-- Crew neck -->
  <path d="M38 30 Q50 36 62 30 Q58 28 50 27 Q42 28 38 30 Z" fill="#2563eb"/>
  <!-- Shine/sparkle stars -->
  <!-- Star 1 (top right) -->
  <path d="M76 16 L78 12 L80 16 L84 18 L80 20 L78 24 L76 20 L72 18 Z" fill="#fde047"/>
  <!-- Star 2 (left) -->
  <path d="M16 22 L17.5 18 L19 22 L23 23.5 L19 25 L17.5 29 L16 25 L12 23.5 Z" fill="#fde047"/>
  <!-- Star 3 (bottom right) -->
  <path d="M80 62 L81.5 58 L83 62 L87 63.5 L83 65 L81.5 69 L80 65 L76 63.5 Z" fill="#fde047"/>
  <!-- Small sparkle dots -->
  <circle cx="72" cy="26" r="2" fill="#fde047"/>
  <circle cx="85" cy="30" r="1.5" fill="#fde047"/>
  <circle cx="14" cy="35" r="1.5" fill="#fde047"/>
  <!-- Price tag -->
  <rect x="54" y="38" width="20" height="14" rx="2" fill="#f5f5f5" stroke="#94a3b8" stroke-width="1"/>
  <!-- Tag hole -->
  <circle cx="56" cy="41" r="1.5" fill="#94a3b8"/>
  <!-- Tag string -->
  <line x1="56" y1="42" x2="54" y2="46" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2,1"/>
  <!-- Tag text lines -->
  <line x1="59" y1="42" x2="72" y2="42" stroke="#64748b" stroke-width="1"/>
  <line x1="59" y1="46" x2="72" y2="46" stroke="#94a3b8" stroke-width="0.8"/>
  <line x1="59" y1="49" x2="68" y2="49" stroke="#94a3b8" stroke-width="0.8"/>
  <!-- NOU text on shirt -->
  <text x="43" y="58" font-family="Arial,sans-serif" font-size="7" fill="#dbeafe" font-weight="700">NOU!</text>

  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">NOU</text>
</svg>
