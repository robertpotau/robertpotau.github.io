<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Cos edifici principal (rectangle ample i baix) -->
  <rect x="5" y="48" width="90" height="38" rx="3" fill="#6366f1"/>
  <!-- Sostre arquejat (arc) -->
  <path d="M5,50 Q50,12 95,50" fill="#4f46e5"/>
  <!-- Porta gran central -->
  <rect x="35" y="62" width="30" height="24" rx="2" fill="#3730a3"/>
  <ellipse cx="50" cy="62" rx="15" ry="6" fill="#3730a3"/>
  <!-- Finestres laterals (altes) -->
  <rect x="10" y="55" width="18" height="22" rx="2" fill="#a5b4fc"/>
  <line x1="19" y1="55" x2="19" y2="77" stroke="#818cf8" stroke-width="1"/>
  <rect x="72" y="55" width="18" height="22" rx="2" fill="#a5b4fc"/>
  <line x1="81" y1="55" x2="81" y2="77" stroke="#818cf8" stroke-width="1"/>
  <!-- Línia de base edifici -->
  <rect x="3" y="84" width="94" height="4" rx="2" fill="#3730a3"/>
  <!-- Pilota esportiva (lateral dret) -->
  <circle cx="86" cy="40" r="9" fill="#f97316"/>
  <!-- Línies pilota de bàsquet -->
  <path d="M78,40 Q86,33 94,40" fill="none" stroke="#ea580c" stroke-width="1.5"/>
  <path d="M78,40 Q86,47 94,40" fill="none" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="86" y1="31" x2="86" y2="49" stroke="#ea580c" stroke-width="1.5"/>
  <!-- Text al frontó -->
  <text x="50" y="37" font-family="Arial,sans-serif" font-size="6" fill="#e0e7ff" font-weight="700" text-anchor="middle">POLIESPORTIU</text>
  <!-- Label -->
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">POLIESPORTIU</text>
</svg>
