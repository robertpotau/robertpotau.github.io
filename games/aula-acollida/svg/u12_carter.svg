<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Cap -->
  <circle cx="50" cy="21" r="10" fill="#f5cba7" stroke="#c0835a" stroke-width="1.2"/>
  <!-- Gorra blava de visera -->
  <ellipse cx="50" cy="16" rx="11" ry="5" fill="#1d4ed8"/>
  <rect x="39" y="13" width="22" height="6" rx="2" fill="#1d4ed8"/>
  <!-- Visera -->
  <ellipse cx="50" cy="19" rx="14" ry="3" fill="#1e40af"/>
  <!-- Insígnia gorra -->
  <rect x="47" y="14" width="6" height="4" rx="1" fill="#fde047"/>
  <!-- Cuell -->
  <rect x="46" y="29" width="8" height="5" fill="#f5cba7"/>
  <!-- Uniforme blau -->
  <rect x="36" y="33" width="28" height="22" rx="3" fill="#1d4ed8"/>
  <!-- Braç esquerre (bossa penjant al costat) -->
  <rect x="24" y="34" width="12" height="8" rx="3" fill="#1d4ed8"/>
  <!-- Braç dret amb carta/sobre -->
  <rect x="64" y="34" width="12" height="8" rx="3" fill="#1d4ed8"/>
  <!-- Sobre/carta a la mà dreta -->
  <rect x="72" y="26" width="14" height="10" rx="1" fill="#f5f5f5" stroke="#d1d5db" stroke-width="0.8"/>
  <polygon points="72,26 79,32 86,26" fill="#e5e7eb" stroke="#d1d5db" stroke-width="0.5"/>
  <!-- Bossa de carter al lateral esquerre -->
  <rect x="14" y="38" width="14" height="18" rx="2" fill="#92400e"/>
  <rect x="14" y="36" width="14" height="4" rx="1" fill="#78350f"/>
  <!-- Tira de la bossa -->
  <line x1="21" y1="36" x2="28" y2="28" stroke="#78350f" stroke-width="2"/>
  <!-- Cames -->
  <rect x="36" y="55" width="12" height="18" rx="2" fill="#1d4ed8"/>
  <rect x="52" y="55" width="12" height="18" rx="2" fill="#1d4ed8"/>
  <!-- Sabates -->
  <rect x="35" y="71" width="14" height="4" rx="2" fill="#1f2937"/>
  <rect x="51" y="71" width="14" height="4" rx="2" fill="#1f2937"/>
  <!-- Label -->
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">CARTER</text>
</svg>
