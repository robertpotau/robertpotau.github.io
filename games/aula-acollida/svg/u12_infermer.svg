  <rect x="40" y="11" width="20" height="8" rx="2" fill="#f5f5f5" stroke="#e5e7eb" stroke-width="0.8"/>
  <ellipse cx="50" cy="11" rx="11" ry="3" fill="#f5f5f5" stroke="#e5e7eb" stroke-width="0.8"/>
  <!-- Creu vermella a la gorra -->
  <rect x="48" y="12" width="4" height="7" rx="0.5" fill="#ef4444"/>
  <rect x="45" y="14" width="10" height="3" rx="0.5" fill="#ef4444"/>
