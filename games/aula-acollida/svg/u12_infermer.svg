  <rect x="40" y="36" width="8" height="6" rx="1" fill="#e5e7eb"/>
  <rect x="43" y="37" width="2" height="4" fill="#ef4444"/>
  <rect x="41" y="38" width="6" height="2" fill="#ef4444"/>
  <!-- Braç esquerre -->
  <rect x="24" y="34" width="12" height="8" rx="3" fill="#f5f5f5" stroke="#e5e7eb" stroke-width="0.5"/>
  <!-- Braç dret -->
  <rect x="64" y="34" width="12" height="8" rx="3" fill="#f5f5f5" stroke="#e5e7eb" stroke-width="0.5"/>
  <!-- Estetoscopi penjant al coll -->
  <path d="M44,34 Q38,45 40,52 Q42,56 50,55 Q58,56 60,52 Q62,45 56,34" stroke="#6b7280" stroke-width="1.5" fill="none"/>
  <circle cx="50" cy="55" r="3" fill="#6b7280"/>
  <circle cx="50" cy="55" r="1.5" fill="#94a3b8"/>
