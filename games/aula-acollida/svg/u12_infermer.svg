  <circle cx="40" cy="32" r="2" fill="#6b7280"/>
  <circle cx="60" cy="32" r="2" fill="#6b7280"/>
  <!-- Cames -->
  <rect x="36" y="55" width="12" height="18" rx="2" fill="#f5f5f5" stroke="#e5e7eb" stroke-width="0.5"/>
  <rect x="52" y="55" width="12" height="18" rx="2" fill="#f5f5f5" stroke="#e5e7eb" stroke-width="0.5"/>
