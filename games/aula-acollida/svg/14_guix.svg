<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 42">
  <!-- cos del guix (blanc/gris clar) -->
  <rect x="8" y="8" width="68" height="26" rx="5" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <!-- extrem arrodonit esquerra (més fosc) -->
  <rect x="8" y="8" width="16" height="26" rx="5" fill="#d1d5db"/>
  <!-- punta cònica dreta -->
  <polygon points="76,8 92,21 76,34" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
  <!-- brillantor (línia blanca) -->
  <line x1="20" y1="14" x2="74" y2="14" stroke="white" stroke-width="2.5" opacity="0.7"/>
</svg>
