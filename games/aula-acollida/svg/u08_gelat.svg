<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cucurutxo de gelat -->
  <!-- Con de galeta -->
  <path d="M 30 52 L 50 88 L 70 52 Z" fill="#d97706"/>
  <path d="M 31 52 L 50 86 L 69 52 Z" fill="#f59e0b"/>
  <!-- Textura de la galeta (quadrats) -->
  <line x1="38" y1="52" x2="44" y2="78" stroke="#92400e" stroke-width="1.5" opacity="0.5"/>
  <line x1="47" y1="52" x2="50" y2="68" stroke="#92400e" stroke-width="1.5" opacity="0.5"/>
  <line x1="56" y1="52" x2="56" y2="78" stroke="#92400e" stroke-width="1.5" opacity="0.5"/>
  <line x1="32" y1="58" x2="68" y2="58" stroke="#92400e" stroke-width="1.5" opacity="0.5"/>
  <line x1="34" y1="65" x2="66" y2="65" stroke="#92400e" stroke-width="1.5" opacity="0.5"/>
  <line x1="37" y1="72" x2="63" y2="72" stroke="#92400e" stroke-width="1.5" opacity="0.5"/>
  <!-- Bola de gelat principal (xocolata) -->
  <circle cx="50" cy="35" r="24" fill="#c4a882"/>
  <circle cx="50" cy="33" r="22" fill="#d4b896"/>
  <!-- Brillantor gelat -->
  <circle cx="42" cy="25" r="7" fill="white" opacity="0.25"/>
  <!-- Gotes degotant -->
  <path d="M 36 52 Q 34 58 35 63" fill="none" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 65 53 Q 67 59 66 64" fill="none" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>
  <!-- Connexió con-bola -->
  <ellipse cx="50" cy="52" rx="20" ry="5" fill="#c4a882"/>
  <!-- Label -->
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">GELAT</text>
</svg>
