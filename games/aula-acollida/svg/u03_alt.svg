<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Tall figure (left) -->
  <circle cx="32" cy="14" r="8" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <rect x="26" y="22" width="12" height="30" rx="3" fill="#3b82f6"/>
  <rect x="26" y="52" width="5" height="18" rx="2" fill="#1e40af"/>
  <rect x="33" y="52" width="5" height="18" rx="2" fill="#1e40af"/>
  <!-- Height arrow for tall -->
  <line x1="18" y1="6" x2="18" y2="70" stroke="#ef4444" stroke-width="2"/>
  <polygon points="18,4 14,12 22,12" fill="#ef4444"/>
  <polygon points="18,72 14,64 22,64" fill="#ef4444"/>
  <!-- Short figure (right) -->
  <circle cx="72" cy="44" r="7" fill="#ffd68a" stroke="#d97706" stroke-width="1.5"/>
  <rect x="66" y="51" width="12" height="20" rx="3" fill="#f97316"/>
  <rect x="66" y="71" width="4" height="10" rx="2" fill="#ea580c"/>
  <rect x="74" y="71" width="4" height="10" rx="2" fill="#ea580c"/>
  <!-- Comparison line -->
  <line x1="14" y1="70" x2="86" y2="70" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- ALT label next to tall figure -->
  <text x="32" y="87" font-family="Arial,sans-serif" font-size="7" fill="#3b82f6" font-weight="700" text-anchor="middle">ALT</text>
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">ALT</text>
</svg>
