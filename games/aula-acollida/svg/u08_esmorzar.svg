<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Taula d'esmorzar: cafè, croissant, got de suc -->
  <!-- Taula -->
  <rect x="5" y="68" width="90" height="10" rx="4" fill="#92400e"/>
  <rect x="5" y="65" width="90" height="6" rx="3" fill="#d97706"/>
  <!-- Estovalles -->
  <rect x="5" y="65" width="90" height="4" rx="2" fill="#fef3c7"/>
  <!-- GOT DE SUC (esquerra) -->
  <path d="M 10 38 L 12 65 L 26 65 L 28 38 Z" fill="#fb923c" opacity="0.8"/>
  <path d="M 10 38 L 12 65 L 26 65 L 28 38 Z" fill="none" stroke="#7dd3fc" stroke-width="2"/>
  <ellipse cx="19" cy="38" rx="9" ry="3" fill="#bae6fd" opacity="0.7"/>
  <!-- CROISSANT (centre) -->
  <path d="M 38 55 Q 42 38 50 35 Q 58 38 62 55 Q 58 62 50 63 Q 42 62 38 55 Z" fill="#d97706"/>
  <path d="M 40 55 Q 44 40 50 37 Q 56 40 60 55" fill="none" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>
  <path d="M 42 58 Q 50 56 58 58" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- TASSA DE CAFÈ (dreta) -->
  <path d="M 70 44 L 72 65 L 88 65 L 90 44 Z" fill="#f5f5f5"/>
  <ellipse cx="80" cy="44" rx="10" ry="3" fill="#1f2937"/>
  <path d="M 88 50 Q 95 50 95 56 Q 95 62 88 62" fill="none" stroke="#f5f5f5" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Vapor cafè -->
  <path d="M 76 35 Q 77 30 76 25" fill="none" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"/>
  <path d="M 82 33 Q 83 28 82 23" fill="none" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"/>
  <!-- Sol al fons (esmorzar matutí) -->
  <circle cx="50" cy="12" r="10" fill="#fbbf24" opacity="0.7"/>
  <line x1="50" y1="2" x2="50" y2="0" stroke="#fbbf24" stroke-width="2"/>
  <line x1="50" y1="22" x2="50" y2="24" stroke="#fbbf24" stroke-width="2"/>
  <!-- Label -->
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">ESMORZAR</text>
</svg>
