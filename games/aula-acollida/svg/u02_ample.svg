<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Wide rectangle -->
  <rect x="8" y="30" width="84" height="32" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="2.5"/>
  <!-- Double-headed arrow -->
  <line x1="8" y1="74" x2="92" y2="74" stroke="#374151" stroke-width="2.5"/>
  <polygon points="8,74 16,69 16,79" fill="#374151"/>
  <polygon points="92,74 84,69 84,79" fill="#374151"/>
  <!-- Narrow reference box above (for contrast) -->
  <rect x="30" y="18" width="40" height="10" rx="3" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <!-- Arrow showing wide vs narrow -->
  <text x="50" y="52" font-family="Arial,sans-serif" font-size="9" fill="#15803d" font-weight="700" text-anchor="middle">AMPLE</text>
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">AMPLE</text>
</svg>
