<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Roda darrere -->
  <circle cx="22" cy="68" r="15" fill="#374151" stroke="#1f2937" stroke-width="2"/>
  <circle cx="22" cy="68" r="9" fill="#4b5563"/>
  <circle cx="22" cy="68" r="3.5" fill="#6b7280"/>
  <!-- Roda davant -->
  <circle cx="78" cy="68" r="15" fill="#374151" stroke="#1f2937" stroke-width="2"/>
  <circle cx="78" cy="68" r="9" fill="#4b5563"/>
  <circle cx="78" cy="68" r="3.5" fill="#6b7280"/>
  <!-- Quadre del motor (triangle) -->
  <polygon points="22,68 50,45 78,68" fill="none" stroke="#1f2937" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Tub baix quadre -->
  <line x1="22" y1="68" x2="78" y2="68" stroke="#1f2937" stroke-width="3"/>
  <!-- Motor -->
  <rect x="38" y="57" width="22" height="14" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <rect x="42" y="60" width="14" height="8" rx="1.5" fill="#374151"/>
  <!-- Seient -->
  <rect x="28" y="41" width="26" height="7" rx="3.5" fill="#92400e"/>
  <!-- Dipòsit -->
  <ellipse cx="48" cy="44" rx="10" ry="6" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <!-- Manillar -->
  <line x1="72" y1="50" x2="80" y2="44" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <line x1="76" y1="47" x2="84" y2="50" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <!-- Forquilla davantera -->
  <line x1="78" y1="53" x2="76" y2="68" stroke="#1f2937" stroke-width="3" stroke-linecap="round"/>
  <!-- Pedal -->
  <circle cx="50" cy="68" r="3" fill="#6b7280" stroke="#374151" stroke-width="1"/>
  <line x1="44" y1="71" x2="56" y2="71" stroke="#4b5563" stroke-width="2" stroke-linecap="round"/>
  <!-- Escapament -->
  <path d="M22 70 Q10 72 8 68" fill="none" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Label -->
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">MOTO</text>
</svg>
