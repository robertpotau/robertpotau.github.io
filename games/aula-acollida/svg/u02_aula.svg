  <line x1="18" y1="21" x2="45" y2="21" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Board chalk tray -->
  <rect x="10" y="29" width="80" height="3" rx="1" fill="#5c3317"/>
