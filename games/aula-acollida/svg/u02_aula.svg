  <rect x="15" y="42" width="20" height="11" rx="2" fill="#a0522d"/>
  <rect x="40" y="42" width="20" height="11" rx="2" fill="#a0522d"/>
  <rect x="65" y="42" width="20" height="11" rx="2" fill="#a0522d"/>
