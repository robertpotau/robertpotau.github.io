  <rect x="17" y="53" width="3" height="6" fill="#7a3b1e"/>
  <rect x="30" y="53" width="3" height="6" fill="#7a3b1e"/>
  <rect x="42" y="53" width="3" height="6" fill="#7a3b1e"/>
  <rect x="55" y="53" width="3" height="6" fill="#7a3b1e"/>
  <rect x="67" y="53" width="3" height="6" fill="#7a3b1e"/>
  <rect x="80" y="53" width="3" height="6" fill="#7a3b1e"/>
  <!-- Row 2 desks -->
  <rect x="15" y="66" width="20" height="11" rx="2" fill="#a0522d"/>
