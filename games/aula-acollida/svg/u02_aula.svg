  <rect x="65" y="66" width="20" height="11" rx="2" fill="#a0522d"/>
  <!-- Desk legs row 2 -->
  <rect x="17" y="77" width="3" height="6" fill="#7a3b1e"/>
  <rect x="30" y="77" width="3" height="6" fill="#7a3b1e"/>
  <rect x="42" y="77" width="3" height="6" fill="#7a3b1e"/>
  <rect x="55" y="77" width="3" height="6" fill="#7a3b1e"/>
  <rect x="67" y="77" width="3" height="6" fill="#7a3b1e"/>
  <rect x="80" y="77" width="3" height="6" fill="#7a3b1e"/>
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">AULA</text>
