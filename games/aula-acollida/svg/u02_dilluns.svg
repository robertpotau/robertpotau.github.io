<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Rings -->
  <rect x="29" y="3" width="9" height="16" rx="4.5" fill="#1d4ed8"/>
  <rect x="62" y="3" width="9" height="16" rx="4.5" fill="#1d4ed8"/>
  <!-- Page body -->
  <rect x="8" y="10" width="84" height="82" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="3"/>
  <!-- Header -->
  <rect x="8" y="10" width="84" height="28" rx="8" fill="#3b82f6"/>
  <rect x="8" y="28" width="84" height="10" fill="#3b82f6"/>
  <!-- Rings holes -->
  <ellipse cx="33" cy="11" rx="4" ry="4" fill="#eff6ff"/>
  <ellipse cx="67" cy="11" rx="4" ry="4" fill="#eff6ff"/>
  <!-- Day abbr -->
  <text x="50" y="32" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">dl.</text>
  <!-- Day number -->
  <text x="50" y="70" font-family="Arial,sans-serif" font-size="42" font-weight="900" fill="#3b82f6" text-anchor="middle">1</text>
</svg>
