<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Branch (perch) -->
  <rect x="15" y="78" width="60" height="5" rx="2.5" fill="#92400e"/>
  <!-- Legs (thin) -->
  <line x1="44" y1="78" x2="40" y2="88" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="78" x2="56" y2="88" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <!-- Feet -->
  <path d="M37 88 L40 88 L43 85" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M59 88 L56 88 L53 85" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Body (oval, yellow) -->
  <ellipse cx="50" cy="62" rx="22" ry="18" fill="#fde047" stroke="#eab308" stroke-width="2"/>
  <!-- Wing (sketched on body) -->
  <path d="M58 55 Q70 58 68 72 Q62 66 58 72 Q56 62 58 55 Z" fill="#fbbf24" stroke="#eab308" stroke-width="1.5"/>
  <!-- Wing feather details -->
  <path d="M60 60 Q66 62 65 68" fill="none" stroke="#d97706" stroke-width="1" opacity="0.7"/>
  <!-- Head (round) -->
  <circle cx="50" cy="42" r="18" fill="#fde047" stroke="#eab308" stroke-width="2"/>
  <!-- Beak (small triangle, orange) -->
  <path d="M36 42 L30 39 L30 45 Z" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
  <!-- Eye (black, small) -->
  <circle cx="44" cy="39" r="4" fill="#1f2937"/>
  <circle cx="45" cy="38" r="1.5" fill="white"/>
  <!-- Cheek patch -->
  <circle cx="42" cy="44" r="4" fill="#fbbf24" opacity="0.7"/>
  <!-- Musical notes (floating) -->
  <!-- Note 1 -->
  <circle cx="72" cy="28" r="4" fill="#1f2937"/>
  <line x1="76" y1="28" x2="76" y2="14" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
  <line x1="76" y1="14" x2="83" y2="16" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
  <!-- Note 2 -->
  <circle cx="84" cy="36" r="4" fill="#1f2937"/>
  <line x1="88" y1="36" x2="88" y2="22" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
  <line x1="88" y1="22" x2="95" y2="24" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
  <!-- Note 3 (small) -->
  <circle cx="79" cy="44" r="3" fill="#1f2937" opacity="0.7"/>
  <line x1="82" y1="44" x2="82" y2="33" stroke="#1f2937" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Label -->
</svg>
