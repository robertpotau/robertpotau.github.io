<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Cap -->
  <circle cx="40" cy="22" r="9" fill="#f5cba7" stroke="#c0835a" stroke-width="1.2"/>
  <!-- Barret de palla (semicercle ample) -->
  <ellipse cx="40" cy="16" rx="16" ry="7" fill="#fde047" stroke="#d97706" stroke-width="1"/>
  <ellipse cx="40" cy="17" rx="10" ry="5" fill="#fbbf24"/>
  <!-- Textura barret -->
  <line x1="30" y1="14" x2="50" y2="14" stroke="#d97706" stroke-width="0.5" opacity="0.5"/>
  <line x1="28" y1="17" x2="52" y2="17" stroke="#d97706" stroke-width="0.5" opacity="0.5"/>
  <!-- Cuell -->
  <rect x="36" y="29" width="8" height="5" fill="#f5cba7"/>
  <!-- Roba blava -->
  <rect x="28" y="33" width="24" height="22" rx="3" fill="#3b82f6"/>
  <!-- Braç esquerre -->
  <rect x="16" y="34" width="12" height="7" rx="3" fill="#3b82f6"/>
  <!-- Braç dret amb canya de pescar -->
  <rect x="52" y="34" width="12" height="7" rx="3" fill="#3b82f6"/>
  <!-- Canya de pescar (pal llarg diagonal) -->
  <line x1="62" y1="38" x2="90" y2="10" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Fil de pescar -->
  <line x1="90" y1="10" x2="95" y2="35" stroke="#94a3b8" stroke-width="0.8"/>
  <!-- Peix petit al fil -->
  <ellipse cx="95" cy="38" rx="5" ry="3" fill="#60a5fa"/>
  <polygon points="100,38 97,35 97,41" fill="#3b82f6"/>
  <circle cx="93" cy="37" r="0.8" fill="#1e1b4b"/>
  <!-- Cames -->
  <rect x="28" y="55" width="10" height="18" rx="2" fill="#1d4ed8"/>
  <rect x="42" y="55" width="10" height="18" rx="2" fill="#1d4ed8"/>
  <!-- Botes -->
  <rect x="27" y="71" width="12" height="5" rx="2" fill="#1f2937"/>
  <rect x="41" y="71" width="12" height="5" rx="2" fill="#1f2937"/>
  <!-- Label -->
</svg>
