<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Calm background waves -->
  <path d="M10 72 Q20 68 30 72 Q40 76 50 72 Q60 68 70 72 Q80 76 90 72" stroke="#bfdbfe" stroke-width="3" fill="none"/>
  <path d="M10 80 Q20 76 30 80 Q40 84 50 80 Q60 76 70 80 Q80 84 90 80" stroke="#bfdbfe" stroke-width="2.5" fill="none"/>
  <!-- Peaceful face -->
  <circle cx="50" cy="42" r="28" fill="#ffd68a" stroke="#d97706" stroke-width="2"/>
  <!-- Calm eyes (half-closed) -->
  <path d="M30 40 Q36 36 42 40" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M58 40 Q64 36 70 40" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Light closed eye lines -->
  <path d="M30 41 Q36 44 42 41" stroke="#374151" stroke-width="1.5" fill="none"/>
  <path d="M58 41 Q64 44 70 41" stroke="#374151" stroke-width="1.5" fill="none"/>
  <!-- Gentle smile -->
  <path d="M36 52 Q50 62 64 52" stroke="#c2850a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Rosy cheeks (soft) -->
  <circle cx="30" cy="50" r="7" fill="#fca5a5" opacity="0.3"/>
  <circle cx="70" cy="50" r="7" fill="#fca5a5" opacity="0.3"/>
  <!-- Zzz floating -->
  <text x="76" y="24" font-family="Arial,sans-serif" font-size="11" fill="#93c5fd" font-weight="700">z</text>
  <text x="82" y="18" font-family="Arial,sans-serif" font-size="13" fill="#60a5fa" font-weight="700">z</text>
  <text x="88" y="12" font-family="Arial,sans-serif" font-size="15" fill="#3b82f6" font-weight="700">Z</text>
  <text x="50" y="97" font-family="Arial,sans-serif" font-size="8" fill="#1e1b4b" font-weight="700" text-anchor="middle">TRANQUIL</text>
</svg>
