<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Figure body -->
  <rect x="36" y="52" width="18" height="22" rx="3" fill="#7c3aed"/>
  <!-- Head -->
  <circle cx="45" cy="38" r="12" fill="#fcd34d"/>
  <!-- Hair -->
  <path d="M33 33 Q33 24 45 24 Q57 24 57 33" fill="#92400e"/>
