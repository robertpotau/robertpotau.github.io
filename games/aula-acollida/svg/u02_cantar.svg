  <ellipse cx="45" cy="42" rx="5" ry="2" fill="#f87171"/>
  <!-- Eyes happy -->
  <path d="M39 36 Q41 34 43 36" stroke="#374151" stroke-width="1.5" fill="none"/>
  <path d="M47 36 Q49 34 51 36" stroke="#374151" stroke-width="1.5" fill="none"/>
  <!-- Musical notes -->
  <text x="62" y="32" font-family="Arial,sans-serif" font-size="18" fill="#7c3aed">♪</text>
  <text x="70" y="46" font-family="Arial,sans-serif" font-size="14" fill="#ec4899">♫</text>
  <!-- Arms up -->
  <line x1="36" y1="56" x2="24" y2="46" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>
  <line x1="54" y1="56" x2="66" y2="46" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="36" y="74" width="7" height="10" rx="2" fill="#4c1d95"/>
  <rect x="47" y="74" width="7" height="10" rx="2" fill="#4c1d95"/>
