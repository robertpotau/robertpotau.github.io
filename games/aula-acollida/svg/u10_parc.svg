  <line x1="65" y1="52" x2="63" y2="66" stroke="#795548" stroke-width="2" stroke-linecap="round"/>
  <!-- Herba -->
  <rect x="10" y="76" width="80" height="12" rx="3" fill="#81c784"/>
  <!-- Arbre esquerre petit -->
  <rect x="14" y="52" width="5" height="26" rx="2" fill="#795548"/>
