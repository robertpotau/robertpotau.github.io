  <ellipse cx="50" cy="80" rx="22" ry="4" fill="#bcaaa4" opacity="0.6"/>
  <!-- Sol -->
  <circle cx="82" cy="22" r="10" fill="#ffd54f"/>
  <line x1="82" y1="8" x2="82" y2="6" stroke="#ffd54f" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" y1="12" x2="94" y2="10" stroke="#ffd54f" stroke-width="2" stroke-linecap="round"/>
  <line x1="96" y1="22" x2="98" y2="22" stroke="#ffd54f" stroke-width="2" stroke-linecap="round"/>
</svg>
