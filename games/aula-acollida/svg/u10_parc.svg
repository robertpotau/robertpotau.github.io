<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Banc del parc -->
  <rect x="30" y="62" width="40" height="4" rx="2" fill="#8d6e63"/>
  <rect x="30" y="52" width="40" height="4" rx="2" fill="#8d6e63"/>
  <!-- Potes del banc -->
  <path d="M 34,56 L 32,78" stroke="#795548" stroke-width="3" stroke-linecap="round"/>
  <path d="M 66,56 L 68,78" stroke="#795548" stroke-width="3" stroke-linecap="round"/>
