  <line x1="76" y1="26" x2="86" y2="20" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <line x1="76" y1="26" x2="88" y2="28" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="77" cy="27" r="2.5" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
