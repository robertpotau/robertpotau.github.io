<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Cap -->
  <circle cx="50" cy="20" r="10" fill="#f5cba7" stroke="#c0835a" stroke-width="1.2"/>
  <!-- Cabell -->
