  <line x1="23" y1="34" x2="23" y2="38" stroke="#94a3b8" stroke-width="1.2"/>
  <!-- Braç dret amb tisores -->
  <rect x="64" y="33" width="12" height="8" rx="3" fill="#374151"/>
