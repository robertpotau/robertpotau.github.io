  <circle cx="85" cy="28" r="2" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Mirall ovalat al costat -->
  <ellipse cx="88" cy="48" rx="8" ry="11" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <ellipse cx="88" cy="48" rx="6" ry="9" fill="#e0f2fe" opacity="0.5"/>
  <rect x="85" y="59" width="6" height="4" rx="1" fill="#94a3b8"/>
