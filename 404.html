<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pàgina no trobada · Robert Potau</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<style>
  @font-face {
    font-family: 'Nunito';
    font-style: normal;
    font-weight: 400 900;
    font-display: swap;
    src: url('fonts/nunito-400.woff2') format('woff2');
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(180deg, #14082a 0%, #2a0a54 45%, #180a33 100%);
    color: #f5edff;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .wrap { max-width: 560px; }
  .emoji { font-size: 72px; margin-bottom: 10px; }
  h1 { font-size: clamp(30px, 6vw, 48px); font-weight: 900; margin: 0 0 10px; }
  p { color: rgba(245,237,255,0.72); font-size: 16px; margin: 0 0 26px; }
  .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  a.btn {
    display: inline-block;
    background: #9a32ef;
    color: #fff;
    font-weight: 800;
    font-size: 14.5px;
    text-decoration: none;
    padding: 12px 24px;
    border-radius: 99px;
    box-shadow: 0 5px 0 #6e25aa;
  }
  a.btn.secondary {
    background: rgba(255,255,255,0.08);
    box-shadow: none;
    border: 1px solid rgba(255,255,255,0.18);
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="emoji">🧭</div>
    <h1>Aquesta pàgina no existeix</h1>
    <p>Sembla que t'has perdut pels passadissos de l'escola. Torna a l'entrada per trobar els jocs.</p>
    <div class="links">
      <a class="btn" href="/">🏠 Tornar a l'inici</a>
      <a class="btn secondary" href="/classic.html">Versió clàssica</a>
    </div>
  </div>
</body>
</html>
